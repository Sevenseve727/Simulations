name: Update GoatCounter Stats

on:
  schedule:
    - cron: '0 4 * * *'   # täglich 04:00 UTC
  workflow_dispatch: {}    # manuell auslösbar

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GoatCounter stats
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GC_SITE: learnlab
        run: |
          set -e
          END=$(date -u +%Y-%m-%dT23:59:59Z)
          START_30=$(date -u -d "30 days ago" +%Y-%m-%dT00:00:00Z)
          START_14=$(date -u -d "13 days ago" +%Y-%m-%dT00:00:00Z)

          # 30-Tage-Aggregat pro Pfad
          curl -sS --fail-with-body \
            -A "GitHub-Action-LearnLab" \
            -H "Authorization: Bearer $GC_TOKEN" \
            -H "Accept: application/json" \
            "https://${GC_SITE}.goatcounter.com/api/v0/stats/hits?start=${START_30}&end=${END}&limit=200&daily=1" \
            -o stats-raw.json

          # 14-Tage-Reihe (alle Pfade, daily) für Trendgraph
          curl -sS --fail-with-body \
            -A "GitHub-Action-LearnLab" \
            -H "Authorization: Bearer $GC_TOKEN" \
            -H "Accept: application/json" \
            "https://${GC_SITE}.goatcounter.com/api/v0/stats/hits?start=${START_14}&end=${END}&limit=200&daily=1" \
            -o stats-14d.json

          node <<'EOF'
          const fs = require('fs');
          const raw30 = JSON.parse(fs.readFileSync('stats-raw.json', 'utf8'));
          const raw14 = JSON.parse(fs.readFileSync('stats-14d.json', 'utf8'));

          // 30-Tage-Summe pro Pfad
          const out = { updated: new Date().toISOString(), paths: {}, total: 0, daily14: [] };
          for (const h of (raw30.hits || [])) {
            const total = (h.stats || []).reduce((s,d) => s + (d.daily || 0), 0);
            out.paths[h.path] = total;
            out.total += total;
          }

          // 14-Tage-Tagesreihe: pro Datum alle Pfade summieren
          const byDay = {};
          for (const h of (raw14.hits || [])) {
            for (const d of (h.stats || [])) {
              byDay[d.day] = (byDay[d.day] || 0) + (d.daily || 0);
            }
          }
          // genau 14 Tage von heute rückwärts erzeugen (Lücken = 0)
          const today = new Date(); today.setUTCHours(0,0,0,0);
          for (let i = 13; i >= 0; i--) {
            const d = new Date(today); d.setUTCDate(d.getUTCDate() - i);
            const key = d.toISOString().slice(0,10);
            out.daily14.push({ day: key, hits: byDay[key] || 0 });
          }

          fs.writeFileSync('stats.json', JSON.stringify(out, null, 2));
          console.log('Wrote stats.json:', Object.keys(out.paths).length, 'paths,', out.total, 'total, 14d series:', out.daily14.length);
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --cached --quiet || git commit -m "Update stats.json [skip ci]"
          git push
