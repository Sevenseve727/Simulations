  <meta charset="UTF-8"/>

  <title>Alkane &amp; IUPAC-Nomenklatur</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    input,button,select{font-family:inherit}
    ::-webkit-scrollbar{height:6px;width:6px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

<div id="root"><div style="padding:40px;color:#888">Laedt...</div></div>
<script>
window.addEventListener('error',function(e){
  document.getElementById('root').innerHTML=
    '<div style="padding:40px;font-family:monospace;color:#c00;white-space:pre-wrap">'+
    '<b>Fehler:</b> '+(e.message||'unbekannt')+'\n'+
    'Datei: '+(e.filename||'?')+'\n'+

    (e.error&&e.error.stack?'\n\n'+e.error.stack:'')+
    '</div>';

<script>
// ─── SHORTHAND ────────────────────────────────────────────────────────────────
const {useState,useCallback,useEffect} = React;
const h = React.createElement;
const S = (o)=>({style:o});

// ─── IUPAC LOGIK ──────────────────────────────────────────────────────────────
const STAMM={1:"meth",2:"eth",3:"prop",4:"but",5:"pent",6:"hex",7:"hept",8:"oct",9:"non",10:"dec"};
const NK_NAME={1:"methyl",2:"ethyl",3:"propyl"};
const MULT={1:"",2:"di",3:"tri",4:"tetra"};

function buildGraph(hkLen,nk){
  const adj=Array.from({length:hkLen},()=>[]);
  for(let i=0;i<hkLen-1;i++){adj[i].push(i+1);adj[i+1].push(i);}
  let nextId=hkLen;
  const nkNodeIds=[];
  nk.forEach(({pos,len})=>{
    const branch=[];let prev=pos-1;
    for(let k=0;k<len;k++){
      const id=nextId++;adj.push([]);
      adj[prev].push(id);adj[id].push(prev);
      branch.push(id);prev=id;
    }
    nkNodeIds.push(branch);
  });
  return{adj,nkNodeIds};
}

function alleLaengstenKetten(adj){
  const n=adj.length;let maxLen=0;let beste=[];
  function dfs(node,prev,path){
    if(path.length>maxLen){maxLen=path.length;beste=[[...path]];}
    else if(path.length===maxLen){beste.push([...path]);}
    for(const nb of adj[node]){if(nb!==prev&&!path.includes(nb))dfs(nb,node,[...path,nb]);}
  }
  for(let s=0;s<n;s++)dfs(s,-1,[s]);
  const seen=new Set();
  return beste.filter(k=>{const key=[...k].sort((a,b)=>a-b).join(",");if(seen.has(key))return false;seen.add(key);return true;});
}

function berechneIupacInfo(hkLen,nk){
  const{adj,nkNodeIds}=buildGraph(hkLen,nk);
  const alleKetten=alleLaengstenKetten(adj);
  const hkLenKorrekt=alleKetten[0].length;

  function nkLaenge(startNode,ankerNode,hkSet){
    let maxLen=0;
    function dfs2(node,prev,len){
      if(len>maxLen)maxLen=len;
      for(const nb of adj[node])if(nb!==prev&&!hkSet.has(nb))dfs2(nb,node,len+1);
    }
    dfs2(startNode,ankerNode,1);return maxLen;
  }

  function bewerteKette(kette){
    const hkSet=new Set(kette);const n=kette.length;
    const subsV=[];
    kette.forEach((hkNode,idx)=>{
      for(const nb of adj[hkNode])if(!hkSet.has(nb))subsV.push({pos:idx+1,len:nkLaenge(nb,hkNode,hkSet)});
    });
    const subsR=subsV.map(s=>({pos:n+1-s.pos,len:s.len}));
    const sumV=subsV.reduce((a,s)=>a+s.pos,0),sumR=subsR.reduce((a,s)=>a+s.pos,0);
    let subs=subsV,umgekehrt=false;
    if(sumR<sumV){subs=subsR;umgekehrt=true;}
    else if(sumV===sumR){
      const sv=[...subsV].map(s=>s.pos).sort((a,b)=>a-b);
      const sr=[...subsR].map(s=>s.pos).sort((a,b)=>a-b);
      for(let i=0;i<sv.length;i++){if(sr[i]<sv[i]){subs=subsR;umgekehrt=true;break;}if(sv[i]<sr[i])break;}
    }
    const sortedPos=[...subs].map(s=>s.pos).sort((a,b)=>a-b);
    return{kette,hkSet,subs,umgekehrt,sortedPos,sumSubs:subs.reduce((a,s)=>a+s.pos,0)};
  }

  const bewertet=alleKetten.map(bewerteKette);
  bewertet.sort((a,b)=>{
    if(a.sumSubs!==b.sumSubs)return a.sumSubs-b.sumSubs;
    for(let i=0;i<Math.min(a.sortedPos.length,b.sortedPos.length);i++)
      if(a.sortedPos[i]!==b.sortedPos[i])return a.sortedPos[i]-b.sortedPos[i];
    return 0;
  });

  const{kette:hauptkette,subs,umgekehrt}=bewertet[0];
  const n=hkLenKorrekt;
  const lokantMap={};
  hauptkette.forEach((nodeId,idx)=>{lokantMap[nodeId]=umgekehrt?(n-idx):(idx+1);});

  let name;
  if(!subs.length){name=STAMM[hkLenKorrekt]+"an";}
  else{
    const gr={};
    subs.forEach(({pos,len})=>{(gr[len]=gr[len]||[]).push(pos);});
    const parts=Object.entries(gr)
      .map(([len,pos])=>({alpha:NK_NAME[+len]||("C"+len+"yl"),teil:([...pos].sort((a,b)=>a-b).join(","))+"-"+(MULT[pos.length]||"")+(NK_NAME[+len]||("C"+len+"yl"))}))
      .sort((a,b)=>a.alpha.localeCompare(b.alpha));
    name=parts.map(p=>p.teil).join("-")+STAMM[hkLenKorrekt]+"an";
  }
  return{name,lokantMap,echteHkLen:hkLenKorrekt,echteHkNodes:hauptkette,nkNodeIds};
}

function berechneIupacName(hkLen,nk){return berechneIupacInfo(hkLen,nk).name;}
function berechneLokantInfo(hkLen,nk){const i=berechneIupacInfo(hkLen,nk);return{lokantMap:i.lokantMap,nkNodeIds:i.nkNodeIds};}

function normalisiereNK(hkLen,nk){
  const orig=nk.map(n=>({...n}));
  const spigl=nk.map(n=>({pos:hkLen+1-n.pos,len:n.len}));
  const sO=orig.reduce((s,n)=>s+n.pos,0),sS=spigl.reduce((s,n)=>s+n.pos,0);
  if(sS<sO)return spigl;if(sO<sS)return orig;
  const so=[...orig].map(n=>n.pos).sort((a,b)=>a-b);
  const ss=[...spigl].map(n=>n.pos).sort((a,b)=>a-b);
  for(let i=0;i<so.length;i++){if(so[i]<ss[i])return orig;if(ss[i]<so[i])return spigl;}
  return orig;
}

function hatVerzweigteNK(hkLen,nk){
  const{adj}=buildGraph(hkLen,nk);
  const info=berechneIupacInfo(hkLen,nk);
  const hkSet=new Set(info.echteHkNodes||[]);
  for(let node=hkLen;node<adj.length;node++){
    if(hkSet.has(node))continue;
    if(adj[node].filter(nb=>!hkSet.has(nb)).length>1)return true;
  }
  return false;
}

function strukturenGleich(h1,n1,h2,n2){return berechneIupacName(h1,n1)===berechneIupacName(h2,n2);}

function generiereAlkan(sw){
  let v=0;
  while(v++<500){
    let hkLen,anz,lens;
    if(sw==="leicht"){hkLen=4+Math.floor(Math.random()*4);anz=1;lens=[1];}
    else if(sw==="mittel"){hkLen=5+Math.floor(Math.random()*4);anz=1+Math.floor(Math.random()*2);lens=Array.from({length:anz},()=>1+Math.floor(Math.random()*2));}
    else{hkLen=6+Math.floor(Math.random()*4);anz=2+Math.floor(Math.random()*3);lens=Array.from({length:anz},()=>1+Math.floor(Math.random()*3));}
    let nk=[];let t=0;
    while(nk.length<anz&&t++<200){
      const pos=2+Math.floor(Math.random()*(hkLen-2));
      if(nk.filter(n=>n.pos===pos).length<2)nk.push({pos,len:lens[nk.length]});
    }
    nk=normalisiereNK(hkLen,nk);
    const info=berechneIupacInfo(hkLen,nk);
    if(info.echteHkLen>10)continue;
    if(hatVerzweigteNK(hkLen,nk))continue;
    return{hkLen,nk,name:info.name};
  }
  return{hkLen:4,nk:[],name:STAMM[4]+"an"};
}

// ─── LEWIS RENDERER ───────────────────────────────────────────────────────────
function buildLewisLayout(hkLen,nk,sc){
  const STEP=64*sc,NKSTEP=56*sc,CY=110*sc;
  const hkX=i=>70*sc+i*STEP;
  const nkSorted=[...nk].map((n,i)=>({...n,origIdx:i})).sort((a,b)=>a.pos-b.pos);
  const nkDirs={},posCount={};
  nkSorted.forEach(n=>{const p=n.pos;posCount[p]=(posCount[p]||0);nkDirs[n.origIdx]=posCount[p]%2===0?-1:1;posCount[p]++;});
  const nkDirsForHK={};
  nk.forEach((n,ni)=>{(nkDirsForHK[n.pos]=nkDirsForHK[n.pos]||[]).push(nkDirs[ni]);});
  const allPts=[];
  for(let i=0;i<hkLen;i++)allPts.push({x:hkX(i),y:CY});
  nk.forEach((n,ni)=>{const dir=nkDirs[ni];for(let k=1;k<=n.len;k++)allPts.push({x:hkX(n.pos-1),y:CY+dir*k*NKSTEP});});
  return{STEP,NKSTEP,CY,hkX,nkDirs,nkDirsForHK,allPts};
}

function LewisFormel({hkLen,nk,highlight,showNums,scale,onAtomClick,activeAtom,lokantMap,nkNodeIds}){
  const sc=scale||1;
  const HLEN=20*sc,HGAP=7*sc,BOND_W=2.2*sc,CR=15*sc;
  const fontSize=13*sc,fontSizeH=11*sc;
  const hl=highlight||{};
  const HK_COL=hl.hauptkette||"#1e3a5f";
  const NK_COL=hl.nebenkette||"#b45309";
  const H_COL="#9ca3af",NUM_COL="#057a55";
  const{STEP,NKSTEP,CY,hkX,nkDirs,nkDirsForHK,allPts}=buildLewisLayout(hkLen,nk,sc);
  const xs=allPts.map(p=>p.x),ys=allPts.map(p=>p.y);
  const pad=56*sc;
  const minX=Math.min(...xs)-pad,maxX=Math.max(...xs)+pad;
  const minY=Math.min(...ys)-pad,maxY=Math.max(...ys)+pad;
  const W=maxX-minX,H=maxY-minY;
  const tx=x=>x-minX,ty=y=>y-minY;

  function hLine(cx,cy,dx,dy,key){
    const x1=tx(cx)+dx*HGAP,y1=ty(cy)+dy*HGAP;
    const x2=tx(cx)+dx*(HGAP+HLEN),y2=ty(cy)+dy*(HGAP+HLEN);
    const lx=tx(cx)+dx*(HGAP+HLEN+8*sc),ly=ty(cy)+dy*(HGAP+HLEN+8*sc);
    return[
      h("line",{key:"l"+key,x1,y1,x2,y2,stroke:H_COL,strokeWidth:1.4*sc}),
      h("text",{key:"t"+key,x:lx,y:ly+fontSizeH*0.38,textAnchor:"middle",fontSize:fontSizeH,fill:H_COL,fontFamily:"Georgia,serif"},"H")
    ];
  }

  function hStricheHK(idx){
    const cx=hkX(idx),cy=CY;
    const dirsHere=nkDirsForHK[idx+1]||[];
    const nkCount=dirsHere.length;
    const isFirst=idx===0,isLast=idx===hkLen-1;
    const hCount=isFirst||isLast?3-nkCount:2-nkCount;
    const available=[];
    if(!dirsHere.includes(-1))available.push({dx:0,dy:-1});
    if(!dirsHere.includes(1))available.push({dx:0,dy:1});
    if(isFirst)available.push({dx:-1,dy:0});
    if(isLast)available.push({dx:1,dy:0});
    const result=[];
    for(let i=0;i<Math.min(hCount,available.length);i++)result.push(...hLine(cx,cy,available[i].dx,available[i].dy,"hk"+idx+"-"+i));
    return result;
  }

  function hStricheNK(cx,cy,chainIdx,chainLen,dir,ni){
    const isEnd=chainIdx===chainLen-1;
    const hCount=isEnd?3:2;
    const fromDir=-dir;
    const dirs=[{dx:-1,dy:0},{dx:1,dy:0}];
    if(isEnd)dirs.push({dx:0,dy:fromDir===1?-1:1});
    const result=[];
    for(let i=0;i<Math.min(hCount,dirs.length);i++)result.push(...hLine(cx,cy,dirs[i].dx,dirs[i].dy,"nk"+ni+"-"+chainIdx+"-"+i));
    return result;
  }

  const isClickable=pos=>!!onAtomClick&&pos>=2&&pos<=hkLen-1;
  const children=[];

  // HK bonds
  for(let i=0;i<hkLen-1;i++)
    children.push(h("line",{key:"hkb"+i,x1:tx(hkX(i)),y1:ty(CY),x2:tx(hkX(i+1)),y2:ty(CY),stroke:HK_COL,strokeWidth:BOND_W,strokeLinecap:"round"}));

  // NK bonds
  nk.forEach((n,ni)=>{
    const dir=nkDirs[ni],bx=hkX(n.pos-1);
    for(let k=0;k<n.len;k++)
      children.push(h("line",{key:"nkb"+ni+"-"+k,x1:tx(bx),y1:ty(CY+dir*k*NKSTEP),x2:tx(bx),y2:ty(CY+dir*(k+1)*NKSTEP),stroke:NK_COL,strokeWidth:BOND_W*0.85,strokeLinecap:"round"}));
  });

  // HK H-lines
  for(let i=0;i<hkLen;i++)children.push(...hStricheHK(i));

  // NK H-lines
  nk.forEach((n,ni)=>{
    const dir=nkDirs[ni],bx=hkX(n.pos-1);
    for(let k=0;k<n.len;k++)children.push(...hStricheNK(bx,CY+dir*(k+1)*NKSTEP,k,n.len,dir,ni));
  });

  // HK atoms
  for(let i=0;i<hkLen;i++){
    const cx=hkX(i),pos=i+1;
    const clickable=isClickable(pos);
    const isActive=activeAtom===pos;
    const hasNK=nk.some(n=>n.pos===pos);
    const atomChildren=[];
    if(clickable&&!isActive)atomChildren.push(h("circle",{key:"ring",cx:tx(cx),cy:ty(CY),r:CR+8*sc,fill:"rgba(59,130,246,.07)",stroke:"#93c5fd",strokeWidth:1.2*sc,strokeDasharray:"3 3"}));
    if(isActive)atomChildren.push(h("circle",{key:"aring",cx:tx(cx),cy:ty(CY),r:CR+9*sc,fill:"rgba(59,130,246,.18)",stroke:"#2563eb",strokeWidth:2*sc}));
    atomChildren.push(h("circle",{key:"c",cx:tx(cx),cy:ty(CY),r:CR,fill:isActive?"#dbeafe":hasNK&&clickable?"#fef3c7":"#fff",stroke:isActive?"#2563eb":clickable?"#3b82f6":HK_COL,strokeWidth:isActive?2.5*sc:2*sc}));
    atomChildren.push(h("text",{key:"ct",x:tx(cx),y:ty(CY)+fontSize*0.38,textAnchor:"middle",fontSize,fill:isActive?"#1d4ed8":clickable?"#2563eb":HK_COL,fontWeight:"700",fontFamily:"Georgia,serif"},"C"));
    if(showNums){
      const lokant=lokantMap?(lokantMap[i]??lokantMap[String(i)]??null):pos;
      if(lokant!==undefined&&lokant!==null)atomChildren.push(h("text",{key:"num",x:tx(cx),y:ty(CY)+28*sc,textAnchor:"middle",fontSize:10*sc,fill:NUM_COL,fontWeight:"700"},""+lokant));
    }
    children.push(h("g",{key:"hkc"+i,onClick:()=>clickable&&onAtomClick(pos),style:clickable?{cursor:"pointer"}:{}},atomChildren));
  }

  // NK atoms
  nk.forEach((n,ni)=>{
    const dir=nkDirs[ni],bx=hkX(n.pos-1);
    for(let k=0;k<n.len;k++){
      const cy=CY+dir*(k+1)*NKSTEP;
      const nodeId=nkNodeIds?nkNodeIds[ni][k]:null;
      const lokant=lokantMap&&nodeId!==null?(lokantMap[nodeId]??lokantMap[String(nodeId)]??null):null;
      const ac=[];
      ac.push(...hStricheNK(bx,cy,k,n.len,dir,ni));
      ac.push(h("circle",{key:"nkc",cx:tx(bx),cy:ty(cy),r:CR*0.88,fill:"#fff",stroke:NK_COL,strokeWidth:1.8*sc}));
      ac.push(h("text",{key:"nkt",x:tx(bx),y:ty(cy)+fontSize*0.38,textAnchor:"middle",fontSize,fill:NK_COL,fontWeight:"700",fontFamily:"Georgia,serif"},"C"));
      if(showNums&&lokant!==null)ac.push(h("text",{key:"nknum",x:tx(bx)+18*sc,y:ty(cy)+fontSize*0.38,textAnchor:"start",fontSize:10*sc,fill:NUM_COL,fontWeight:"700"},""+lokant));
      children.push(h("g",{key:"nkc"+ni+"-"+k},ac));
    }
  });

  return h("svg",{width:W,height:H,style:{display:"block",margin:"0 auto",overflow:"visible"}},children);
}

// ─── REITER 1: REGELN ─────────────────────────────────────────────────────────
const REGELN=[
  {id:1,farbe:"#1a56db",label:"Hauptkette",text:"Finde die laengste durchgehende C-Kette - sie gibt den Stammnamen (meth-, eth-, prop-, but-, pent-, hex-...)."},
  {id:2,farbe:"#b45309",label:"Nebenketten",text:"Alle Verzweigungen sind Alkylgruppen (Methyl, Ethyl, Propyl). Sie werden als Praefix vor den Stammnamen gestellt."},
  {id:3,farbe:"#057a55",label:"Nummerierung",text:"Nummeriere die Hauptkette so, dass die Nebenketten die niedrigsten Lokanten (Nummern) erhalten."},
  {id:4,farbe:"#9333ea",label:"Alphabetisch",text:"Mehrere verschiedene Substituenten werden alphabetisch geordnet (Ethyl vor Methyl). Multiplikatoren zaehlen dabei nicht."},
  {id:5,farbe:"#dc2626",label:"Multiplikatoren",text:"Gleiche Substituenten: di- (2x), tri- (3x), tetra- (4x). Lokanten mit Komma trennen, z.B. 2,3-dimethyl."},
];
const BEISPIEL={hkLen:6,nk:[{pos:2,len:1},{pos:4,len:2}]};

function RegelReiter(){
  const[hl,setHl]=useState(true);
  const[showNums,setShowNums]=useState(true);
  const li=berechneLokantInfo(BEISPIEL.hkLen,BEISPIEL.nk);
  return h("div",S({maxWidth:780,margin:"0 auto"}),[
    h("h2",{key:"h",style:{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#1e3a5f",marginBottom:6}},"IUPAC-Benennungsregeln fuer Alkane"),
    h("p",{key:"p",style:{color:"#6b7280",marginBottom:20,fontSize:14}},"Die fuenf wichtigsten Schritte - farblich dem Beispiel unten zugeordnet."),
    h("div",{key:"rules",style:{display:"flex",flexDirection:"column",gap:10,marginBottom:26}},
      REGELN.map(r=>h("div",{key:r.id,style:{display:"flex",gap:14,background:"#f8fafc",borderRadius:10,padding:"11px 16px",borderLeft:"4px solid "+r.farbe}},[
        h("div",{key:"n",style:{minWidth:26,height:26,borderRadius:"50%",background:r.farbe,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}},r.id),
        h("div",{key:"t"},[
          h("div",{key:"l",style:{fontWeight:700,color:r.farbe,fontSize:14,marginBottom:2}},r.label),
          h("div",{key:"tx",style:{color:"#374151",fontSize:13.5,lineHeight:1.5}},r.text)
        ])
      ]))
    ),
    h("div",{key:"box",style:{background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:14,padding:"20px 24px"}},[
      h("div",{key:"hd",style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}},[
        h("span",{key:"title",style:{fontWeight:700,color:"#1e3a5f",fontSize:15}},"Beispiel: 4-ethyl-2-methylhexan"),
        h("div",{key:"btns",style:{display:"flex",gap:8}},[
          h("button",{key:"n",onClick:()=>setShowNums(v=>!v),style:{fontSize:12,padding:"4px 12px",borderRadius:6,border:"1px solid #d1d5db",background:showNums?"#dcfce7":"#f3f4f6",color:"#374151",cursor:"pointer"}},showNums?"Nummern aus":"Nummern an"),
          h("button",{key:"f",onClick:()=>setHl(v=>!v),style:{fontSize:12,padding:"4px 12px",borderRadius:6,border:"1px solid #d1d5db",background:hl?"#e0f2fe":"#f3f4f6",color:"#374151",cursor:"pointer"}},hl?"Farben aus":"Farben an"),
        ])
      ]),
      h("div",{key:"svg",style:{overflowX:"auto",paddingBottom:8}},
        h(LewisFormel,{hkLen:BEISPIEL.hkLen,nk:BEISPIEL.nk,scale:0.88,showNums,lokantMap:li.lokantMap,nkNodeIds:li.nkNodeIds,highlight:hl?{hauptkette:"#1a56db",nebenkette:"#b45309"}:{hauptkette:"#374151",nebenkette:"#374151"}})
      ),
      hl&&h("div",{key:"legend",style:{display:"flex",gap:16,marginTop:8,flexWrap:"wrap",justifyContent:"center"}},[
        ["#1a56db","Hauptkette (6C)"],["#b45309","Nebenketten (methyl, ethyl)"],["#057a55","Nummerierung"]
      ].map(([c,l])=>h("div",{key:c,style:{display:"flex",alignItems:"center",gap:6,fontSize:12.5,color:"#374151"}},[
        h("span",{key:"dot",style:{width:12,height:12,borderRadius:"50%",background:c,display:"inline-block"}}),l
      ])))
    ])
  ]);
}

// ─── REITER 2: BENENNEN ───────────────────────────────────────────────────────
function normEingabe(str){
  return str.trim().toLowerCase()
    .replace(/[\u2010\u2011\u2012\u2013\u2014\u2015\u2212\uFE58\uFE63\uFF0D]/g,"-")
    .replace(/\s/g,"");
}

function BenennenReiter({onPunkte}){
  const[sw,setSw]=useState("leicht");
  const[alkan,setAlkan]=useState(()=>generiereAlkan("leicht"));
  const[eingabe,setEingabe]=useState("");
  const[status,setStatus]=useState(null);
  const[loesung,setLoesung]=useState(false);
  const[versuche,setVersuche]=useState(0);
  const[showNums,setShowNums]=useState(false);
  const neues=useCallback(()=>{setAlkan(generiereAlkan(sw));setEingabe("");setStatus(null);setLoesung(false);setVersuche(0);},[sw]);
  useEffect(()=>{neues();},[sw]);
  const pruefen=()=>{
    if(status==="richtig")return;
    const ok=normEingabe(eingabe)===normEingabe(alkan.name);
    setStatus(ok?"richtig":"falsch");setVersuche(v=>v+1);
    if(ok)onPunkte("benennen",versuche===0?3:1);
  };
  const li=berechneLokantInfo(alkan.hkLen,alkan.nk);
  return h("div",S({maxWidth:860,margin:"0 auto"}),[
    h("div",{key:"toolbar",style:{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}},[
      h("span",{key:"lbl",style:{fontWeight:600,color:"#374151",fontSize:14}},"Schwierigkeit:"),
      ...["leicht","mittel","schwer"].map(s=>h("button",{key:s,onClick:()=>setSw(s),style:{padding:"5px 16px",borderRadius:20,border:"1.5px solid",borderColor:sw===s?"#1a56db":"#d1d5db",background:sw===s?"#1a56db":"#fff",color:sw===s?"#fff":"#374151",fontWeight:600,fontSize:13,cursor:"pointer"}},s.charAt(0).toUpperCase()+s.slice(1))),
      h("button",{key:"neu",onClick:neues,style:{marginLeft:"auto",padding:"6px 16px",borderRadius:20,border:"none",background:"#f3f4f6",color:"#374151",fontWeight:600,fontSize:13,cursor:"pointer"}},"\uD83D\uDD00 Neu"),
      h("button",{key:"nums",onClick:()=>setShowNums(v=>!v),style:{padding:"5px 14px",borderRadius:20,border:"1px solid #d1d5db",background:showNums?"#dcfce7":"#fff",color:"#374151",fontSize:13,cursor:"pointer"}},showNums?"Nummern aus":"Nummern an"),
    ]),
    h("div",{key:"mol",style:{background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:14,padding:"20px",marginBottom:16}},[
      h("p",{key:"q",style:{color:"#6b7280",fontSize:13,marginBottom:10}},"Wie heisst dieses Alkan nach IUPAC?"),
      h("div",{key:"svg",style:{overflowX:"auto",paddingBottom:8}},h(LewisFormel,{hkLen:alkan.hkLen,nk:alkan.nk,scale:0.82,showNums,lokantMap:li.lokantMap,nkNodeIds:li.nkNodeIds,highlight:{hauptkette:"#374151",nebenkette:"#374151"}}))
    ]),
    h("div",{key:"inp",style:{display:"flex",gap:10,marginBottom:12}},[
      h("input",{key:"i",value:eingabe,onChange:e=>{setEingabe(e.target.value);setStatus(null);},onKeyDown:e=>e.key==="Enter"&&eingabe&&pruefen(),placeholder:"z.B. 2-methylpropan",style:{flex:1,padding:"10px 16px",borderRadius:10,border:"2px solid "+(status==="richtig"?"#057a55":status==="falsch"?"#dc2626":"#d1d5db"),fontSize:15,fontFamily:"monospace",outline:"none"}}),
      h("button",{key:"b",onClick:pruefen,disabled:!eingabe,style:{padding:"10px 22px",borderRadius:10,border:"none",background:eingabe?"#1a56db":"#e5e7eb",color:eingabe?"#fff":"#9ca3af",fontWeight:700,fontSize:14,cursor:eingabe?"pointer":"default"}},"Pruefen")
    ]),
    status&&h("div",{key:"status",style:{padding:"11px 16px",borderRadius:10,marginBottom:10,background:status==="richtig"?"#ecfdf5":"#fef2f2",border:"1.5px solid "+(status==="richtig"?"#6ee7b7":"#fca5a5"),color:status==="richtig"?"#065f46":"#991b1b",fontWeight:600,fontSize:14}},status==="richtig"?"Richtig! Gut gemacht!":"Leider falsch. Versuche es nochmal."),
    h("button",{key:"loes",onClick:()=>setLoesung(v=>!v),style:{fontSize:13,padding:"6px 16px",borderRadius:8,border:"1px solid #d1d5db",background:"#f9fafb",color:"#6b7280",cursor:"pointer"}},loesung?"Loesung verbergen":"Loesung anzeigen"),
    loesung&&h("div",{key:"sol",style:{marginTop:8,padding:"10px 16px",background:"#fffbeb",borderRadius:8,border:"1px solid #fcd34d",fontFamily:"monospace",fontSize:16,color:"#92400e",fontWeight:600}},alkan.name)
  ]);
}

// ─── REITER 3: BAUEN ──────────────────────────────────────────────────────────
const NK_OPTIONEN=[{len:1,label:"-CH3",desc:"Methylgruppe"},{len:2,label:"-CH2-CH3",desc:"Ethylgruppe"},{len:3,label:"-CH2-CH2-CH3",desc:"Propylgruppe"}];

function BauenReiter({onPunkte}){
  const[aufgabe,setAufgabe]=useState(()=>generiereAlkan("mittel"));
  const[hkLen,setHkLen]=useState(5);
  const[nk,setNk]=useState([]);
  const[status,setStatus]=useState(null);
  const[showTipp,setShowTipp]=useState(false);
  const[activeAtom,setActiveAtom]=useState(null);
  const[showNums,setShowNums]=useState(true);
  const[showName,setShowName]=useState(false);

  const neueAufgabe=()=>{setAufgabe(generiereAlkan("mittel"));setHkLen(5);setNk([]);setStatus(null);setShowTipp(false);setActiveAtom(null);setShowName(false);};
  const handleAtomClick=pos=>{setActiveAtom(prev=>prev===pos?null:pos);setStatus(null);};
  const handleSelectNK=(pos,slot,len)=>{
    setNk(prev=>{
      const amPos=prev.filter(n=>n.pos===pos);
      const andere=prev.filter(n=>n.pos!==pos);
      const neu=[...amPos];
      if(len===null){neu.splice(slot,1);}
      else if(slot<neu.length){neu[slot]={pos,len};}
      else{neu.push({pos,len});}
      return[...andere,...neu];
    });
    setActiveAtom(null);setStatus(null);
  };
  const removeNK=idx=>{setNk(prev=>prev.filter((_,i)=>i!==idx));setStatus(null);};
  const pruefen=()=>{
    if(status==="richtig")return;
    const ok=strukturenGleich(hkLen,nk,aufgabe.hkLen,aufgabe.nk);
    setStatus(ok?"richtig":"falsch");
    if(ok)onPunkte("bauen",2);
  };
  const userName=berechneIupacName(hkLen,nk);

  useEffect(()=>{
    if(!activeAtom)return;
    const close=()=>setActiveAtom(null);
    window.addEventListener("click",close);
    return()=>window.removeEventListener("click",close);
  },[activeAtom]);

  const li=berechneLokantInfo(hkLen,nk);

  // Dropdown
  const sc=0.82,STEP_D=64*sc,hkXD=i=>70*sc+i*STEP_D,CYD=110*sc,padD=56*sc;
  const xsD=Array.from({length:hkLen},(_,i)=>hkXD(i));
  const minXD=Math.min(...xsD)-padD;

  function SlotSection({slot,slotIdx,label}){
    return h("div",S({borderBottom:"1px solid #e5e7eb"}),[
      h("div",{key:"lbl",style:{padding:"6px 12px",fontSize:11,fontWeight:700,color:"#6b7280",background:"#f9fafb"}},label),
      h("div",{key:"none",onClick:()=>handleSelectNK(activeAtom,slotIdx,null),style:{padding:"8px 14px",cursor:"pointer",fontSize:13,background:!slot?"#f0fdf4":"#fff",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",gap:8,color:"#6b7280",fontWeight:600}},[
        !slot&&h("span",{key:"ck",style:{color:"#057a55"}},"\u2713"),
        h("span",{key:"t"},"Kein Rest")
      ]),
      ...NK_OPTIONEN.map(opt=>h("div",{key:opt.len,onClick:()=>handleSelectNK(activeAtom,slotIdx,opt.len),style:{padding:"8px 14px",cursor:"pointer",fontSize:13,background:slot&&slot.len===opt.len?"#fef3c7":"#fff",color:slot&&slot.len===opt.len?"#92400e":"#374151",fontWeight:slot&&slot.len===opt.len?700:500,borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",gap:8}},[
        slot&&slot.len===opt.len&&h("span",{key:"ck",style:{color:"#d97706"}},"\u2713"),
        h("div",{key:"info"},[
          h("div",{key:"l",style:{fontFamily:"monospace",fontSize:12}},opt.label),
          h("div",{key:"d",style:{fontSize:10,color:"#9ca3af",marginTop:1}},opt.desc)
        ])
      ]))
    ]);
  }

  return h("div",S({maxWidth:960,margin:"0 auto"}),[
    // Aufgabe
    h("div",{key:"aufg",style:{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:12,padding:"14px 20px",marginBottom:18,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}},[
      h("div",{key:"info",style:{flex:1}},[
        h("div",{key:"lbl",style:{fontSize:13,color:"#1e40af",fontWeight:600,marginBottom:4}},"\uD83E\uDDEA Baue dieses Alkan:"),
        h("div",{key:"name",style:{fontFamily:"monospace",fontSize:22,fontWeight:700,color:"#1e3a5f"}},aufgabe.name)
      ]),
      h("button",{key:"neu",onClick:neueAufgabe,style:{padding:"7px 18px",borderRadius:8,border:"none",background:"#1a56db",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}},"Neue Aufgabe")
    ]),
    h("div",{key:"main",style:{display:"flex",gap:18,flexWrap:"wrap"}},[
      // Left panel
      h("div",{key:"left",style:{flex:"0 0 210px",display:"flex",flexDirection:"column",gap:12}},[
        // HK
        h("div",{key:"hk",style:{background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:12,padding:14}},[
          h("div",{key:"t",style:{fontWeight:700,color:"#1e3a5f",fontSize:13,marginBottom:8}},"Hauptkette"),
          h("div",{key:"ctrl",style:{display:"flex",alignItems:"center",gap:8}},[
            h("button",{key:"m",onClick:()=>{if(hkLen>3){setHkLen(h=>h-1);setNk(p=>p.filter(n=>n.pos<=hkLen-2));setStatus(null);setActiveAtom(null);}},style:{width:28,height:28,borderRadius:6,border:"1px solid #d1d5db",background:"#f3f4f6",fontWeight:700,fontSize:16,cursor:"pointer",color:"#374151",lineHeight:1}},"-"),
            h("span",{key:"v",style:{fontFamily:"monospace",fontSize:20,fontWeight:700,color:"#1a56db",minWidth:24,textAlign:"center"}},hkLen),
            h("button",{key:"p",onClick:()=>{if(hkLen<10){setHkLen(h=>h+1);setStatus(null);setActiveAtom(null);}},style:{width:28,height:28,borderRadius:6,border:"1px solid #d1d5db",background:"#f3f4f6",fontWeight:700,fontSize:16,cursor:"pointer",color:"#374151",lineHeight:1}},"+"),
            h("span",{key:"u",style:{fontSize:12,color:"#9ca3af"}},"C-Atome")
          ])
        ]),
        h("div",{key:"hint",style:{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:"10px 12px",fontSize:12.5,color:"#0369a1",lineHeight:1.5}},"Klicke auf ein blaues C-Atom (C2 - C"+(hkLen-1)+"), um Reste anzuhaengen."),
        nk.length>0&&h("div",{key:"placed",style:{background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:12,padding:14}},[
          h("div",{key:"t",style:{fontWeight:700,color:"#1e3a5f",fontSize:13,marginBottom:8}},"Platzierte Gruppen"),
          ...nk.map((n,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:8,marginBottom:6,background:"#fef3c7",borderRadius:6,padding:"5px 10px"}},[
            h("span",{key:"l",style:{fontSize:12,color:"#92400e",fontWeight:600,flex:1}},"C"+n.pos+": "+(NK_NAME[n.len]||"?")),
            h("button",{key:"x",onClick:()=>removeNK(i),style:{fontSize:13,color:"#dc2626",background:"none",border:"none",cursor:"pointer",lineHeight:1}},"\u2715")
          ]))
        ]),
        h("button",{key:"check",onClick:pruefen,style:{padding:"10px",borderRadius:10,border:"none",background:"#1a56db",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}},"\u2713 Pruefen"),
        status&&h("div",{key:"status",style:{padding:"10px 14px",borderRadius:8,background:status==="richtig"?"#ecfdf5":"#fef2f2",border:"1.5px solid "+(status==="richtig"?"#6ee7b7":"#fca5a5"),color:status==="richtig"?"#065f46":"#991b1b",fontWeight:600,fontSize:13}},status==="richtig"?"Perfekt! Molekuel stimmt!":"Noch nicht ganz. Preuefe Hauptkette und Positionen."),
        h("button",{key:"tipp",onClick:()=>setShowTipp(v=>!v),style:{fontSize:12,color:"#6b7280",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",textAlign:"left"}},showTipp?"Tipp ausblenden":"Tipp anzeigen"),
        showTipp&&h("div",{key:"tipptxt",style:{fontSize:12.5,color:"#374151",background:"#f0fdf4",padding:"8px 12px",borderRadius:8,border:"1px solid #86efac"}},["Hauptkette: ",h("strong",{key:"hk"},aufgabe.hkLen+" C-Atome"),". Nebenketten: ",h("strong",{key:"nk"},""+aufgabe.nk.length)])
      ]),
      // Right panel
      h("div",{key:"right",style:{flex:"1 1 400px",background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:14,padding:16,minHeight:280,position:"relative"}},[
        h("div",{key:"hdr",style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}},[
          h("div",{key:"info"},[
            h("div",{key:"t",style:{fontSize:13,fontWeight:700,color:"#374151"}},"\uD83D\uDC41 Deine Strukturformel"),
          ]),
          h("div",{key:"btns",style:{display:"flex",gap:8}},[
            h("button",{key:"name",onClick:()=>setShowName(v=>!v),style:{fontSize:12,padding:"4px 12px",borderRadius:6,border:"1px solid #d1d5db",background:showName?"#fffbeb":"#f3f4f6",color:"#374151",cursor:"pointer"}},showName?"Name verbergen":"Name anzeigen"),
            h("button",{key:"nums",onClick:()=>setShowNums(v=>!v),style:{fontSize:12,padding:"4px 12px",borderRadius:6,border:"1px solid #d1d5db",background:showNums?"#dcfce7":"#f3f4f6",color:"#374151",cursor:"pointer"}},showNums?"Nummern aus":"Nummern an"),
          ])
        ]),
        showName&&h("div",{key:"namebox",style:{marginBottom:8}},[
          h("div",{key:"n",style:{fontFamily:"monospace",fontSize:13,color:"#1a56db"}},userName)
        ]),
        h("div",{key:"svgwrap",style:{overflowX:"auto",paddingBottom:10,position:"relative"},onClick:e=>e.stopPropagation()},[
          h(LewisFormel,{key:"lf",hkLen,nk,scale:0.82,showNums,lokantMap:li.lokantMap,nkNodeIds:li.nkNodeIds,highlight:{hauptkette:"#1e3a5f",nebenkette:"#b45309"},onAtomClick:handleAtomClick,activeAtom}),
          activeAtom!==null&&activeAtom>=2&&activeAtom<=hkLen-1&&(()=>{
            const atomX=hkXD(activeAtom-1)-minXD;
            const atomY=CYD-padD;
            const amPos=nk.filter(n=>n.pos===activeAtom);
            const slot0=amPos[0]||null,slot1=amPos[1]||null;
            return h("div",{key:"dd",style:{position:"absolute",left:Math.max(0,atomX-70),top:atomY+28*sc+10,zIndex:100,background:"#fff",border:"2px solid #3b82f6",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,.15)",minWidth:220,maxHeight:420,overflowY:"auto"}},[
              h("div",{key:"hd",style:{padding:"8px 12px",background:"#eff6ff",borderBottom:"1px solid #bfdbfe",fontSize:12,fontWeight:700,color:"#1e40af"}},"C"+activeAtom+" - Reste waehlen"),
              h(SlotSection,{key:"s0",slot:slot0,slotIdx:0,label:"1. REST"}),
              h(SlotSection,{key:"s1",slot:slot1,slotIdx:1,label:"2. REST (optional)"})
            ]);
          })()
        ])
      ])
    ])
  ]);
}

// ─── REITER 4: FORTSCHRITT ────────────────────────────────────────────────────
function FortschrittReiter({punkte}){
  const total=punkte.benennen.reduce((a,b)=>a+b,0)+punkte.bauen.reduce((a,b)=>a+b,0);
  const rB=punkte.benennen.filter(p=>p>0).length;
  const rBau=punkte.bauen.filter(p=>p>0).length;
  function Card({title,icon,anzahl,richtig,pkt,color}){
    return h("div",S({flex:"1 1 200px",background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:14,padding:22}),[
      h("div",{key:"i",style:{fontSize:28,marginBottom:8}},icon),
      h("div",{key:"t",style:{fontSize:16,fontWeight:700,color:"#1e3a5f",marginBottom:12}},title),
      h("div",{key:"stats",style:{display:"flex",flexDirection:"column",gap:7}},[
        h("div",{key:"a",style:{fontSize:13,color:"#6b7280"}},["Aufgaben: ",h("strong",{key:"v",style:{color:"#374151"}},anzahl)]),
        h("div",{key:"r",style:{fontSize:13,color:"#6b7280"}},["Richtig: ",h("strong",{key:"v",style:{color:"#057a55"}},richtig)]),
        h("div",{key:"p",style:{fontSize:13,color:"#6b7280"}},["Punkte: ",h("strong",{key:"v",style:{color}},pkt)]),
        anzahl>0&&h("div",{key:"bar"},[
          h("div",{key:"track",style:{height:8,background:"#f3f4f6",borderRadius:4,overflow:"hidden",marginTop:4}},
            h("div",{key:"fill",style:{height:"100%",width:Math.round(richtig/anzahl*100)+"%",background:color,borderRadius:4,transition:"width .4s"}})
          ),
          h("div",{key:"pct",style:{fontSize:11,color:"#9ca3af"}},Math.round(richtig/anzahl*100)+"% richtig")
        ])
      ])
    ]);
  }
  return h("div",S({maxWidth:680,margin:"0 auto"}),[
    h("div",{key:"hero",style:{background:"linear-gradient(135deg,#1e3a5f 0%,#1a56db 100%)",borderRadius:16,padding:"24px 28px",marginBottom:24,color:"#fff",display:"flex",alignItems:"center",gap:18}},[
      h("div",{key:"i",style:{fontSize:48}},"\uD83C\uDFC6"),
      h("div",{key:"info"},[
        h("div",{key:"l",style:{fontSize:13,opacity:.8,marginBottom:2}},"Gesamtpunkte"),
        h("div",{key:"n",style:{fontSize:42,fontWeight:800,fontFamily:"'Playfair Display',serif"}},total)
      ])
    ]),
    h("div",{key:"cards",style:{display:"flex",gap:16,flexWrap:"wrap"}},[
      h(Card,{key:"b",title:"Benennen",icon:"\uD83D\uDD2C",anzahl:punkte.benennen.length,richtig:rB,pkt:punkte.benennen.reduce((a,b)=>a+b,0),color:"#1a56db"}),
      h(Card,{key:"ba",title:"Bauen",icon:"\uD83E\uDDF1",anzahl:punkte.bauen.length,richtig:rBau,pkt:punkte.bauen.reduce((a,b)=>a+b,0),color:"#b45309"})
    ]),
    total===0&&h("div",{key:"empty",style:{textAlign:"center",marginTop:32,color:"#9ca3af",fontSize:14}},"Noch keine Aufgaben geloest. Starte mit dem Benennen oder Bauen!"),
    total>0&&h("div",{key:"msg",style:{marginTop:20,padding:"14px 18px",background:"#f0fdf4",borderRadius:10,border:"1px solid #86efac",fontSize:14,color:"#065f46"}},
      total>=20?"Hervorragend! Du beherrschst die IUPAC-Nomenklatur sehr gut!":total>=10?"Gute Arbeit! Weiter so!":"Gut gestartet! Uebe weiter, um mehr Punkte zu sammeln.")
  ]);
}

// ─── HAUPT-APP ────────────────────────────────────────────────────────────────
function AlkanApp(){
  const[tab,setTab]=useState(0);
  const[punkte,setPunkte]=useState({benennen:[],bauen:[]});
  const addPunkte=useCallback((typ,p)=>{setPunkte(prev=>({...prev,[typ]:[...prev[typ],p]}));},[]);
  const TABS=["\uD83D\uDCD6 Regeln","\uD83D\uDD2C Benennen","\uD83E\uDDF1 Bauen","\uD83C\uDFC6 Fortschritt"];
  const content=[h(RegelReiter,{key:"r"}),h(BenennenReiter,{key:"b",onPunkte:addPunkte}),h(BauenReiter,{key:"ba",onPunkte:addPunkte}),h(FortschrittReiter,{key:"f",punkte})];
  return h("div",S({minHeight:"100vh",background:"#f0f4f8",fontFamily:"'Source Sans 3','Segoe UI',sans-serif"}),[
    h("div",{key:"nav",style:{background:"linear-gradient(135deg,#1e3a5f 0%,#1a56db 100%)",padding:"18px 24px 0",boxShadow:"0 2px 12px rgba(30,58,95,.15)"}},[
      h("div",{key:"inner",style:{maxWidth:980,margin:"0 auto"}},[
        h("div",{key:"title",style:{color:"#fff",marginBottom:16}},[
          h("div",{key:"sub",style:{fontSize:11,letterSpacing:2,textTransform:"uppercase",opacity:.7,marginBottom:2}},"Chemie - Klasse 10"),
          h("div",{key:"main",style:{fontSize:22,fontFamily:"'Playfair Display',serif",fontWeight:700}},"Alkane & IUPAC-Nomenklatur")
        ]),
        h("div",{key:"tabs",style:{display:"flex",gap:4,flexWrap:"wrap"}},
          TABS.map((t,i)=>h("button",{key:i,onClick:()=>setTab(i),style:{padding:"9px 18px",borderRadius:"8px 8px 0 0",border:"none",background:tab===i?"#f0f4f8":"rgba(255,255,255,.12)",color:tab===i?"#1e3a5f":"rgba(255,255,255,.85)",fontWeight:tab===i?700:500,fontSize:13.5,cursor:"pointer"}},t))
        )
      ])
    ]),
    h("div",{key:"content",style:{maxWidth:980,margin:"0 auto",padding:"28px 16px"}},content[tab])
  ]);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(h(AlkanApp,null));
</script>
</body>
