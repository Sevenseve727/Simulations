function renderDragDrop(items, targets, explanation, allowMulti) {
  // items: [{label, id}]
  // targets: [{text, correctId}]
  // State für prüfen in window speichern
  window._dndState = { explanation, allowMulti: allowMulti || false };
  const body = document.getElementById('taskBody');
  body.innerHTML = `
    <div class="dnd-container">
      <div>
        <div class="dnd-label">Begriffe:</div>
        <div class="dnd-items" id="dndItems">
          ${items.map((it, i) => `<div class="dnd-item" draggable="true" data-id="${it.id}" data-label="${it.label}" data-idx="${i}">${it.label}</div>`).join('')}
        </div>
      </div>
      <div>
        <div class="dnd-label">Ziele:</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${targets.map((t, i) => `
            <div style="display:flex; gap:10px; align-items:center; background:rgba(255,255,255,0.04); padding:10px; border-radius:10px;">
              <div style="flex:1; font-size:0.95em; color:#d0d8f5;">${t.text}</div>
              <div class="dnd-target" data-target="${i}" data-correct="${t.correctId}"></div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
    <div style="margin-top:12px;">
      <button class="btn btn-primary" id="dndCheckBtn">Prüfen</button>
    </div>
  `;
  document.getElementById('dndCheckBtn').addEventListener('click', checkDragDrop);
  setupDragDropHandlers(allowMulti);
}

function setupDragDropHandlers(allowMulti) {
  const items = document.querySelectorAll('#dndItems .dnd-item');
  const targets = document.querySelectorAll('.dnd-target');
  let draggedItem = null;

  items.forEach(item => {
    // Mouse
    item.addEventListener('dragstart', (e) => {
      draggedItem = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      if (draggedItem) draggedItem.classList.remove('dragging');
      draggedItem = null;
    });
    // Touch
    let touchClone = null;
    let startX, startY;
    item.addEventListener('touchstart', (e) => {
      e.preventDefault();
      draggedItem = item;
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      touchClone = item.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = '1000';
      touchClone.style.pointerEvents = 'none';
      touchClone.style.opacity = '0.8';
      const rect = item.getBoundingClientRect();
      touchClone.style.left = rect.left + 'px';
      touchClone.style.top = rect.top + 'px';
      touchClone.style.width = rect.width + 'px';
      document.body.appendChild(touchClone);
      item.classList.add('dragging');
    }, {passive:false});
    item.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!touchClone) return;
      const touch = e.touches[0];
      const rect = item.getBoundingClientRect();
      touchClone.style.left = (touch.clientX - rect.width/2) + 'px';
      touchClone.style.top = (touch.clientY - rect.height/2) + 'px';
      // Highlight target under finger
      document.querySelectorAll('.dnd-target').forEach(t => t.classList.remove('hover'));
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('dnd-target')) {
        el.classList.add('hover');
      }
    }, {passive:false});
    item.addEventListener('touchend', (e) => {
      if (!touchClone) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      document.body.removeChild(touchClone);
      touchClone = null;
      item.classList.remove('dragging');
      if (el && el.classList.contains('dnd-target')) {
        placeItemInTarget(item, el, allowMulti);
      }
      draggedItem = null;
    });
  });

  targets.forEach(target => {
    target.addEventListener('dragover', (e) => {
      e.preventDefault();
      target.classList.add('hover');
    });
    target.addEventListener('dragleave', () => {
      target.classList.remove('hover');
    });
    target.addEventListener('drop', (e) => {
      e.preventDefault();
      target.classList.remove('hover');
      if (draggedItem) {
        placeItemInTarget(draggedItem, target, allowMulti);
      }
    });
  });
}

function placeItemInTarget(item, target, allowMulti) {
  // Wenn Ziel schon belegt ist: bestehendes Item zurück zu Items
  const existing = target.querySelector('.dnd-item');
  if (existing) {
    document.getElementById('dndItems').appendChild(existing);
  }
  if (!allowMulti) {
    // Nicht multi: Klon des Items setzen und Original zurücklassen? Oder verschieben.
    target.appendChild(item);
    target.classList.add('filled');
  } else {
    // Multi-mode: Klon erstellen (Items bleiben wählbar)
    // Aber Klon zählt nur als Platzierung
    const clone = item.cloneNode(true);
    // Remove draggable/listener from clone to avoid chaos
    clone.classList.add('placed-clone');
    target.innerHTML = '';
    target.appendChild(clone);
    target.classList.add('filled');
  }
}

function checkDragDrop() {
  const { explanation } = window._dndState;
  const targets = document.querySelectorAll('.dnd-target');
  let allCorrect = true;
  targets.forEach(target => {
    const item = target.querySelector('.dnd-item');
    const correctId = target.dataset.correct;
    if (!item || item.dataset.id !== correctId) {
      allCorrect = false;
      target.style.borderColor = '#f87171';
      target.style.background = 'rgba(248,113,113,0.15)';
    } else {
      target.style.borderColor = '#4ade80';
      target.style.background = 'rgba(74,222,128,0.15)';
    }
  });
  // Buttons deaktivieren
  document.querySelectorAll('#dndItems .dnd-item').forEach(i => {
    i.draggable = false;
    i.style.opacity = '0.6';
  });
  showFeedback(allCorrect, explanation);
}

function renderCloze(text, words, distractors, explanation) {
  window._clozeState = { words, explanation };
  // Alle Wörter (Lösungen + Distraktoren) mischen
  const allWords = [...words, ...distractors].sort(() => Math.random() - 0.5);
  // Text in HTML mit Drop-Zonen umwandeln
  let html = text;
  words.forEach((_, i) => {
    html = html.replace(`{${i}}`, `<span class="cloze-slot" data-slot="${i}"></span>`);
  });
  const body = document.getElementById('taskBody');
  body.innerHTML = `
    <div class="cloze-text">${html}</div>
    <div class="dnd-label" style="margin-top:18px;">Wörter zum Ziehen:</div>
    <div class="dnd-items" id="clozeWords">
      ${allWords.map(w => `<div class="dnd-item cloze-word" draggable="true" data-word="${w}">${w}</div>`).join('')}
    </div>
    <div style="margin-top:12px;">
      <button class="btn btn-primary" id="clozeCheckBtn">Prüfen</button>
    </div>
  `;
  document.getElementById('clozeCheckBtn').addEventListener('click', checkCloze);
  setupClozeDragDrop();
}

function setupClozeDragDrop() {
  const words = document.querySelectorAll('.cloze-word');
  const slots = document.querySelectorAll('.cloze-slot');
  let dragged = null;

  words.forEach(w => {
    w.addEventListener('dragstart', () => {
      dragged = w;
      w.classList.add('dragging');
    });
    w.addEventListener('dragend', () => {
      if (dragged) dragged.classList.remove('dragging');
      dragged = null;
    });
    // Touch
    let clone = null;
    w.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dragged = w;
      const touch = e.touches[0];
      clone = w.cloneNode(true);
      clone.style.position = 'fixed';
      clone.style.zIndex = '1000';
      clone.style.pointerEvents = 'none';
      clone.style.opacity = '0.8';
      const rect = w.getBoundingClientRect();
      clone.style.left = rect.left + 'px';
      clone.style.top = rect.top + 'px';
      document.body.appendChild(clone);
      w.classList.add('dragging');
    }, {passive:false});
    w.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!clone) return;
      const touch = e.touches[0];
      clone.style.left = (touch.clientX - 40) + 'px';
      clone.style.top = (touch.clientY - 20) + 'px';
      document.querySelectorAll('.cloze-slot').forEach(s => s.classList.remove('hover'));
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('cloze-slot')) el.classList.add('hover');
    }, {passive:false});
    w.addEventListener('touchend', (e) => {
      if (!clone) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      document.body.removeChild(clone);
      clone = null;
      w.classList.remove('dragging');
      if (el && el.classList.contains('cloze-slot')) {
        placeClozeWord(w, el);
      }
      dragged = null;
    });
  });

  slots.forEach(slot => {
    slot.addEventListener('dragover', (e) => {
      e.preventDefault();
      slot.classList.add('hover');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('hover'));
    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      slot.classList.remove('hover');
      if (dragged) placeClozeWord(dragged, slot);
    });
    // Klick, um Wort wieder herauszunehmen
    slot.addEventListener('click', () => {
      if (slot.dataset.word) {
        const wordDiv = document.querySelector(`.cloze-word[data-word="${slot.dataset.word}"]`);
        if (wordDiv) {
          wordDiv.style.opacity = '1';
          wordDiv.draggable = true;
        }
        slot.textContent = '';
        delete slot.dataset.word;
        slot.classList.remove('filled');
      }
    });
  });
}

function placeClozeWord(wordEl, slot) {
  // Wenn slot bereits befüllt: altes Wort befreien
  if (slot.dataset.word) {
    const oldWord = document.querySelector(`.cloze-word[data-word="${slot.dataset.word}"]`);
    if (oldWord) { oldWord.style.opacity = '1'; oldWord.draggable = true; }
  }
  slot.textContent = wordEl.dataset.word;
  slot.dataset.word = wordEl.dataset.word;
  slot.classList.add('filled');
  wordEl.style.opacity = '0.3';
  wordEl.draggable = false;
}

function checkCloze() {
  const { words, explanation } = window._clozeState;
  let allCorrect = true;
  document.querySelectorAll('.cloze-slot').forEach((slot, i) => {

function setupLabelingDragDrop() {
  const items = document.querySelectorAll('.label-item');
  const targets = document.querySelectorAll('.label-target');
  let dragged = null;

  items.forEach(item => {
    item.addEventListener('dragstart', () => { dragged = item; item.classList.add('dragging'); });
    item.addEventListener('dragend', () => { if (dragged) dragged.classList.remove('dragging'); dragged = null; });
    let clone = null;
    item.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dragged = item;
      const touch = e.touches[0];
      clone = item.cloneNode(true);
      clone.style.position = 'fixed';
      clone.style.zIndex = '1000';
      clone.style.pointerEvents = 'none';
      clone.style.opacity = '0.8';
      const rect = item.getBoundingClientRect();
      clone.style.left = rect.left + 'px';
      clone.style.top = rect.top + 'px';
      document.body.appendChild(clone);
    }, {passive:false});
    item.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!clone) return;
      const touch = e.touches[0];
      clone.style.left = (touch.clientX - 40) + 'px';
      clone.style.top = (touch.clientY - 20) + 'px';
      document.querySelectorAll('.label-target').forEach(t => t.classList.remove('hover-target'));
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest('.label-target') : null;
      if (target) target.classList.add('hover-target');
    }, {passive:false});
    item.addEventListener('touchend', (e) => {
      if (!clone) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest('.label-target') : null;
      document.body.removeChild(clone); clone = null;
      if (target) placeLabel(item, target);
      dragged = null;
    });
  });

  targets.forEach(target => {
    target.addEventListener('dragover', (e) => { e.preventDefault(); target.classList.add('hover-target'); });
    target.addEventListener('dragleave', () => target.classList.remove('hover-target'));
    target.addEventListener('drop', (e) => {
      e.preventDefault();
      target.classList.remove('hover-target');
      if (dragged) placeLabel(dragged, target);
    });
  });
}

function placeLabel(item, target) {
  // Falls target schon ein Label hat: altes zurück
  const oldId = target.dataset.placedId;
  if (oldId) {
    const old = document.querySelector(`.label-item[data-id="${oldId}"]`);
    if (old) { old.style.opacity = '1'; old.draggable = true; }
    // Altes Label-Text im SVG entfernen
    const oldText = target.querySelector('.placed-label-text');
    if (oldText) oldText.remove();
  }
  target.dataset.placedId = item.dataset.id;
  target.dataset.placedLabel = item.textContent;
  // Text ins SVG setzen
  const xmlns = 'http://www.w3.org/2000/svg';
  const text = document.createElementNS(xmlns, 'text');
  text.setAttribute('class', 'placed-label-text');
  text.setAttribute('x', target.dataset.lblX || 0);
  text.setAttribute('y', target.dataset.lblY || 0);
  text.setAttribute('text-anchor', target.dataset.anchor || 'middle');
  text.setAttribute('fill', '#ffd700');
  text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '600');
  text.textContent = item.textContent;
  target.appendChild(text);
  item.style.opacity = '0.3';
  item.draggable = false;
}

function checkLabeling() {
  const { explanation } = window._labelState;
  const targets = document.querySelectorAll('.label-target');
  let allCorrect = true;
  targets.forEach(target => {
    const placedId = target.dataset.placedId;
    const correctId = target.dataset.id;
    const txt = target.querySelector('.placed-label-text');
    if (placedId === correctId) {
      if (txt) txt.setAttribute('fill', '#4ade80');
    } else {
      allCorrect = false;
      if (txt) txt.setAttribute('fill', '#f87171');
    }
  });
  document.querySelectorAll('.label-item').forEach(i => i.draggable = false);
  document.getElementById('labelCheckBtn').style.display = 'none';
  showFeedback(allCorrect, explanation);
}

// =========================================
// PAAR-MEMORY (Mini-Game)
// =========================================
// pairs: [{a: "Begriff/Bild", b: "Erklärung"}]
function renderMemory(pairs, explanation) {
  window._memState = {
    pairs, explanation,
    flipped: [],      // aktuell aufgedeckte (noch nicht als Paar bestätigte) Karten
    matched: [],      // bereits gelöste pair-Indizes
    attempts: 0
  };
  // Karten erzeugen: jedes Paar → 2 Karten (a und b) mit gleicher pairIdx
  const cards = [];
  pairs.forEach((p, i) => {
    cards.push({ pairIdx: i, side: 'a', content: p.a });
    cards.push({ pairIdx: i, side: 'b', content: p.b });
  });
  cards.sort(() => Math.random() - 0.5);
  window._memState.cards = cards;
  const body = document.getElementById('taskBody');
  const gridCols = cards.length <= 8 ? 4 : 4;
  body.innerHTML = `
    <div class="hint-box"><strong>🎴 Finde die Paare!</strong> Decke jeweils zwei Karten auf. Gehören sie zusammen, bleiben sie offen.</div>
    <div id="memGrid" style="display:grid; grid-template-columns:repeat(${gridCols}, 1fr); gap:8px; margin-top:12px;">
      ${cards.map((c, i) => `
        <div class="mem-card" data-idx="${i}">
          <div class="mem-front">?</div>
          <div class="mem-back">${c.content}</div>
        </div>
      `).join('')}
    </div>
    <div id="memStatus" style="margin-top:12px; text-align:center; color:#b8c0e5; font-size:0.9em;">
      Versuche: <span id="memAttempts">0</span> | Paare: <span id="memMatched">0</span>/${pairs.length}
    </div>
  `;
  document.querySelectorAll('.mem-card').forEach(card => {
    card.addEventListener('click', () => flipMemCard(parseInt(card.dataset.idx)));
  });
}

function flipMemCard(idx) {
  const s = window._memState;
  const card = document.querySelector(`.mem-card[data-idx="${idx}"]`);
  // Nicht erlaubt, wenn schon aufgedeckt/gelöst oder 2 aufgedeckt
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (s.flipped.length >= 2) return;

  card.classList.add('flipped');
  s.flipped.push(idx);

  if (s.flipped.length === 2) {
    s.attempts++;
    document.getElementById('memAttempts').textContent = s.attempts;
    const [a, b] = s.flipped;
    const cardA = s.cards[a], cardB = s.cards[b];
    const isMatch = cardA.pairIdx === cardB.pairIdx && cardA.side !== cardB.side;
    if (isMatch) {
      setTimeout(() => {
        document.querySelector(`.mem-card[data-idx="${a}"]`).classList.add('matched');
        document.querySelector(`.mem-card[data-idx="${b}"]`).classList.add('matched');
        s.matched.push(cardA.pairIdx);
        document.getElementById('memMatched').textContent = s.matched.length;
        s.flipped = [];
        if (s.matched.length === s.pairs.length) {
          // Alles geschafft
          const perfect = s.attempts === s.pairs.length;
          showFeedback(true, s.explanation + `<br><br>Du hast <strong>${s.attempts} Versuche</strong> gebraucht.` + (perfect ? ' Perfekt ohne Fehler! 🏆' : ''));
        }
      }, 400);
    } else {
      setTimeout(() => {
        document.querySelector(`.mem-card[data-idx="${a}"]`).classList.remove('flipped');
        document.querySelector(`.mem-card[data-idx="${b}"]`).classList.remove('flipped');
        s.flipped = [];
      }, 1100);
    }
  }
}

// =========================================
// ZEICHEN-AUFGABEN
// =========================================
// Generische Funktion: SchülerIn zeichnet eine Linie von Punkt A zu Punkt B.
// Es wird geprüft, ob das gezeichnete Ende in einer Zielregion landet (und ggf. durch Zwischenpunkte geht).
function renderDrawing(setupFn) {
  // setupFn bekommt das taskBody und soll Canvas + eigene Logik einrichten,
  // und am Ende showFeedback(ok, explanation) selbst aufrufen.
  const body = document.getElementById('taskBody');
  body.innerHTML = `<div id="drawContainer"></div>`;
  setupFn(document.getElementById('drawContainer'));
}

// =========================================
// DRAWING ENGINE - Linien durch Ziehen erstellen
// =========================================
// config: { canvas, fixedStartPoint (optional), startZone (optional: {x,y,r} - wo Start liegen darf),
//          onLineComplete(line) - callback wenn eine Linie fertig gezogen wurde,
//          redraw() - Funktion, die Canvas-Hintergrund neu malt }
function createDrawingEngine(config) {
  const canvas = config.canvas;
  const ctx = canvas.getContext('2d');
  let state = {
    isDrawing: false,
    startPt: null,
    currentPt: null,
    lines: [],           // Array: { x1, y1, x2, y2, color, dashed }
    lockedLines: [],     // Bestätigte Linien (nicht mehr löschbar)
    protractor: null,    // { x, y, angle } - Geodreieck-Position
    protractorDrag: false
  };

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: (t.clientX - rect.left) * canvas.width / rect.width,
      y: (t.clientY - rect.top) * canvas.height / rect.height
    };
  }

  function render() {
    // Hintergrund neu malen lassen
    config.redraw(ctx);
    // Bestätigte (gelockte) Linien
    state.lockedLines.forEach(l => drawLine(l));
    // Aktuelle Linien
    state.lines.forEach(l => drawLine(l));
    // Aktuell gezogene Linie
    if (state.isDrawing && state.startPt && state.currentPt) {
      drawLine({
        x1: state.startPt.x, y1: state.startPt.y,
        x2: state.currentPt.x, y2: state.currentPt.y,
        color: config.drawColor || '#ffd700',
        dashed: false,
        preview: true
      });
      // Winkelanzeige (falls gewünscht)
      if (config.showAngleWhileDrawing) {
        const dx = state.currentPt.x - state.startPt.x;
        const dy = state.currentPt.y - state.startPt.y;
        const len = Math.hypot(dx, dy);
        if (len > 20) {
          ctx.fillStyle = '#ffd700';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText(`Länge: ${Math.round(len)}px`, state.currentPt.x + 10, state.currentPt.y - 10);
        }
      }
    }
    // Geodreieck
    if (state.protractor) {
      drawProtractor(state.protractor);
    }
  }

  function drawLine(l) {
    ctx.strokeStyle = l.color || '#ffd700';
    ctx.lineWidth = l.width || 3;
    if (l.dashed) ctx.setLineDash([6,4]);
    ctx.beginPath();
    ctx.moveTo(l.x1, l.y1);
    ctx.lineTo(l.x2, l.y2);
    ctx.stroke();
    ctx.setLineDash([]);
    // Pfeilspitze optional
    if (l.arrow) {
      const ang = Math.atan2(l.y2-l.y1, l.x2-l.x1);
      const size = 10;
      ctx.fillStyle = l.color;
      ctx.beginPath();
      ctx.moveTo(l.x2, l.y2);
      ctx.lineTo(l.x2 - size*Math.cos(ang - Math.PI/6), l.y2 - size*Math.sin(ang - Math.PI/6));
      ctx.lineTo(l.x2 - size*Math.cos(ang + Math.PI/6), l.y2 - size*Math.sin(ang + Math.PI/6));
      ctx.closePath(); ctx.fill();
    }
    // Start-/Endpunkte markieren
    if (!l.preview) {
      ctx.fillStyle = l.color;
      ctx.beginPath(); ctx.arc(l.x1, l.y1, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(l.x2, l.y2, 4, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawProtractor(p) {
    // Geodreieck: halbkreisförmig, 18cm Skalenreferenz, mit Gradanzeige
    const cx = p.x, cy = p.y;
    const R = 85;  // Radius
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(p.angle || 0);
    // Transparenter Hintergrund
    ctx.fillStyle = 'rgba(255, 235, 180, 0.15)';
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
    ctx.lineWidth = 2;
    // Halbkreis
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI, false);
    ctx.lineTo(-R, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Grundlinie
    ctx.strokeStyle = 'rgba(255, 215, 0, 1)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-R, 0); ctx.lineTo(R, 0);
    ctx.stroke();
    // Mittelstrich (senkrecht)
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(0, R);
    ctx.stroke();
    // Gradmarkierungen alle 10° von 0-180°
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.9)';
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    for (let deg = 0; deg <= 180; deg += 10) {
      const rad = deg * Math.PI / 180;
      // Punkt auf dem Halbkreis (von rechts nach links)
      // deg=0 → rechts (1,0), deg=90 → oben (0,1), deg=180 → links (-1,0)
      // Wir zeichnen aber das Geodreieck "nach unten" orientiert (Skalenseite ist bei positivem y? Nein, negativ)
      // Halbkreis oberhalb: wenn wir y positiv nach unten denken, liegt die Skala oben
      // Bei ctx.arc(0,0,R,0,Math.PI) wird ein Halbkreis nach unten gezeichnet (weil Canvas-y nach unten)
      // Ah wait: Math.PI=rad → unten-halb. Meine Grundlinie ist y=0, Punkte gehen nach y=+R (unten)
      // Also muss das Geodreieck "nach unten" sein - das ist ok weil so der User es auf Lot/Strahlen legen kann
      const px = Math.cos(Math.PI - rad) * R; // invertieren, damit 0° rechts, 180° links
      const py = Math.sin(Math.PI - rad) * R * -1; // negativ, damit Skala oben...
      // Zu kompliziert. Einfacher: Halbkreis nach unten, 0° = rechts, 90° = unten, 180° = links
      const actualPx = Math.cos(rad) * R;
      const actualPy = Math.sin(rad) * R;
      const isMajor = deg % 30 === 0;
      const tickLen = isMajor ? 10 : 6;
      const innerX = actualPx * (R - tickLen) / R;
      const innerY = actualPy * (R - tickLen) / R;
      ctx.beginPath();
      ctx.moveTo(innerX, innerY);
      ctx.lineTo(actualPx, actualPy);
      ctx.stroke();
      if (isMajor) {
        const labelX = actualPx * (R - 20) / R;
        const labelY = actualPy * (R - 20) / R;
        ctx.fillText(deg.toString(), labelX, labelY + 3);
      }
    }
    ctx.restore();
    // Drehpunkt-Marker
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
    // Hinweistext
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Ziehen: verschieben | ⟲ drehen', cx - 75, cy - 95);
  }

  function isPointInProtractor(x, y) {
    if (!state.protractor) return false;
    const dx = x - state.protractor.x;
    const dy = y - state.protractor.y;
    return Math.hypot(dx, dy) < 10;
  }

  function onDown(e) {
    e.preventDefault();
    const p = getPos(e);
    // Wenn Geodreieck aktiv und nah am Drehpunkt: Geodreieck dragen
    if (state.protractor && isPointInProtractor(p.x, p.y)) {
      state.protractorDrag = true;
      return;
    }
    // Falls startZone definiert: Start muss dort liegen
    if (config.startZone) {
      const sz = config.startZone;
      const d = Math.hypot(p.x - sz.x, p.y - sz.y);
      if (d > sz.r) return; // Außerhalb -> nichts tun
      state.startPt = { x: sz.x, y: sz.y }; // Fest auf Zentrum snappen
    } else {
      state.startPt = p;
    }
    state.currentPt = p;
    state.isDrawing = true;
    render();
  }

  function onMove(e) {
    e.preventDefault();
    const p = getPos(e);
    if (state.protractorDrag && state.protractor) {
      state.protractor.x = p.x;
      state.protractor.y = p.y;
      render();
      return;
    }
    if (!state.isDrawing) return;
    state.currentPt = p;
    render();
  }

  function onUp(e) {
    if (state.protractorDrag) {
      state.protractorDrag = false;
      return;
    }
    if (!state.isDrawing) return;
    state.isDrawing = false;
    if (state.startPt && state.currentPt) {
      const dist = Math.hypot(state.currentPt.x - state.startPt.x, state.currentPt.y - state.startPt.y);
      if (dist > 15) { // Mindestlänge
        const line = {
          x1: state.startPt.x, y1: state.startPt.y,
          x2: state.currentPt.x, y2: state.currentPt.y,
          color: config.drawColor || '#ffd700',
          dashed: false,
          arrow: config.arrow !== false
        };
        state.lines = [line]; // Immer nur eine aktuelle Linie
        if (config.onLineComplete) config.onLineComplete(line);
      }
    }
    state.startPt = null;
    state.currentPt = null;
    render();
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove', onMove, {passive:false});
  canvas.addEventListener('touchend', onUp);

  return {
    render,
    clearCurrent() { state.lines = []; render(); },
    lockCurrent(color) {
      if (state.lines.length > 0) {
        const l = state.lines[0];
        if (color) l.color = color;
        state.lockedLines.push(l);
        state.lines = [];
      }
      render();
    },
    clearAll() { state.lines = []; state.lockedLines = []; render(); },
    addLockedLine(line) { state.lockedLines.push(line); render(); },
    getCurrentLine() { return state.lines[0] || null; },
    getLockedLines() { return state.lockedLines; },
    toggleProtractor(x, y) {
      if (state.protractor) { state.protractor = null; }
      else { state.protractor = { x: x || canvas.width/2, y: y || canvas.height/2, angle: 0 }; }
      render();
    },
    hasProtractor() { return !!state.protractor; }
  };
}

// =========================================
// DRAW HELPERS: Linie zeichnen, Winkel messen, Snap
// =========================================

// Hilfsfunktion: Position eines Maus/Touch-Events auf Canvas ermitteln
function getCanvasPos(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches && e.touches.length ? e.touches[0] : (e.changedTouches && e.changedTouches.length ? e.changedTouches[0] : e);
  return {
    x: (t.clientX - rect.left) * canvas.width / rect.width,
    y: (t.clientY - rect.top) * canvas.height / rect.height
  };
}

// Snap: Punkt zu nächstem Snap-Punkt im Radius magnetisch ziehen
function snapToPoints(p, snapPoints, radius) {
  let best = null, bestDist = radius;
  snapPoints.forEach(sp => {
    const d = Math.hypot(p.x - sp.x, p.y - sp.y);
    if (d < bestDist) { bestDist = d; best = sp; }
  });
  return best ? { x: best.x, y: best.y, snapped: true, id: best.id } : { ...p, snapped: false };
}

// Winkel zwischen zwei Punkten und dem Lot (vertikale Linie) berechnen
// Gibt Winkel in Grad zurück: 0 = senkrecht nach oben, 90 = waagerecht
function angleFromVertical(fromX, fromY, toX, toY) {
  const dx = toX - fromX;
  const dy = fromY - toY; // y ist invertiert (Canvas)
  return Math.atan2(dx, dy) * 180 / Math.PI;
}

// Pfeilspitze zeichnen
function drawArrowhead(ctx, x1, y1, x2, y2, color, size = 8) {
  const ang = Math.atan2(y2 - y1, x2 - x1);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - size * Math.cos(ang - Math.PI/6), y2 - size * Math.sin(ang - Math.PI/6));
  ctx.lineTo(x2 - size * Math.cos(ang + Math.PI/6), y2 - size * Math.sin(ang + Math.PI/6));
  ctx.closePath();
  ctx.fill();
}

// Winkelbogen zeichnen
function drawAngleArc(ctx, cx, cy, startRad, endRad, radius, color, label) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, startRad, endRad, startRad > endRad);
  ctx.stroke();
  if (label) {
    const midAng = (startRad + endRad) / 2;
    ctx.fillStyle = color;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(label, cx + Math.cos(midAng) * (radius + 14) - 6, cy + Math.sin(midAng) * (radius + 14) + 5);
  }
}

// =========================================
// MOND-DRAG&DROP
// =========================================
function setupMoonDragDrop(correctMap, explanation) {
  const items = document.querySelectorAll('#moonItems .dnd-item');
  const targets = document.querySelectorAll('.moon-drop');
  let draggedItem = null;

  items.forEach(item => {
    item.addEventListener('dragstart', (e) => {
      draggedItem = item;
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => {
      if (draggedItem) draggedItem.classList.remove('dragging');
      draggedItem = null;
    });
    // Touch
    let touchClone = null;
    item.addEventListener('touchstart', (e) => {
      e.preventDefault();
      draggedItem = item;
      const touch = e.touches[0];
      touchClone = item.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = '1000';
      touchClone.style.pointerEvents = 'none';
      touchClone.style.opacity = '0.8';
      const rect = item.getBoundingClientRect();
      touchClone.style.left = rect.left + 'px';
      touchClone.style.top = rect.top + 'px';
      touchClone.style.width = rect.width + 'px';
      document.body.appendChild(touchClone);
      item.classList.add('dragging');
    }, {passive:false});
    item.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!touchClone) return;
      const touch = e.touches[0];
      const rect = item.getBoundingClientRect();
      touchClone.style.left = (touch.clientX - rect.width/2) + 'px';
      touchClone.style.top = (touch.clientY - rect.height/2) + 'px';
    }, {passive:false});
    item.addEventListener('touchend', (e) => {
      if (!touchClone) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      document.body.removeChild(touchClone);
      touchClone = null;
      item.classList.remove('dragging');
      if (el && el.classList.contains('moon-drop')) {
        placeMoonItem(item, el);
      }
      draggedItem = null;
    });
  });

  targets.forEach(target => {
    target.addEventListener('dragover', (e) => {
      e.preventDefault();
    });
    target.addEventListener('drop', (e) => {
      e.preventDefault();
      if (draggedItem) {
        placeMoonItem(draggedItem, target);
      }
    });
  });

  window._moonState = { correctMap, explanation };
}

function placeMoonItem(item, target) {
  // Entferne ggf. bisherigen Inhalt in anderen targets mit dieser id
  document.querySelectorAll('.moon-drop').forEach(t => {
    if (t.dataset.filled === item.dataset.id) {
      delete t.dataset.filled;
      t.setAttribute('fill', 'rgba(255,255,255,0.04)');
    }
  });
  target.dataset.filled = item.dataset.id;
  target.setAttribute('fill', 'rgba(255,215,0,0.2)');
  target.setAttribute('stroke', '#ffd700');
  // Text im SVG einfügen
  const pos = target.dataset.pos;
  // Alten Text entfernen
  document.querySelectorAll(`.moon-label[data-pos="${pos}"]`).forEach(t => t.remove());
  const svg = document.getElementById('moonPhases');
  const xmlns = 'http://www.w3.org/2000/svg';
  const text = document.createElementNS(xmlns, 'text');
  const x = parseFloat(target.getAttribute('x')) + parseFloat(target.getAttribute('width'))/2;
  const y = parseFloat(target.getAttribute('y')) + parseFloat(target.getAttribute('height'))/2 + 3;
  text.setAttribute('x', x);
  text.setAttribute('y', y);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('fill', '#ffd700');
  text.setAttribute('font-size', '9');
  text.setAttribute('font-weight', '600');
  text.setAttribute('class', 'moon-label');
  text.setAttribute('data-pos', pos);
  // Lange Wörter umbrechen
  const label = item.textContent;
  if (label.length > 12) {
    const parts = label.split(' ');
    const tspan1 = document.createElementNS(xmlns, 'tspan');
    tspan1.setAttribute('x', x);
    tspan1.setAttribute('dy', '-5');
    tspan1.textContent = parts[0];
    const tspan2 = document.createElementNS(xmlns, 'tspan');
    tspan2.setAttribute('x', x);
    tspan2.setAttribute('dy', '12');
    tspan2.textContent = parts.slice(1).join(' ');
    text.appendChild(tspan1);
    text.appendChild(tspan2);
  } else {
    text.textContent = label;
  }
  svg.appendChild(text);
  // Item optisch als "benutzt" markieren
  item.style.opacity = '0.4';
  item.draggable = false;

  // Wenn alle gesetzt, automatisch prüfen? Nein - lieber Check-Button
  if (!document.getElementById('moonCheck')) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.id = 'moonCheck';
    btn.textContent = 'Prüfen';
    btn.style.marginTop = '10px';
    btn.onclick = checkMoonDrops;
    item.parentElement.parentElement.appendChild(btn);
  }
}

function checkMoonDrops() {
  const s = window._moonState;
  let allCorrect = true;
  document.querySelectorAll('.moon-drop').forEach(target => {
    const pos = target.dataset.pos;
    const filled = target.dataset.filled;
    const expected = s.correctMap[pos];
    if (filled === expected) {
      target.setAttribute('stroke', '#4ade80');
      target.setAttribute('fill', 'rgba(74,222,128,0.2)');
    } else {
      target.setAttribute('stroke', '#f87171');
      target.setAttribute('fill', 'rgba(248,113,113,0.2)');
      allCorrect = false;
    }
  });
  const btn = document.getElementById('moonCheck');
  if (btn) btn.style.display = 'none';
  showFeedback(allCorrect, s.explanation);
}

</script>

<script>
// App starten
document.addEventListener('DOMContentLoaded', () => {
  showHome();
});
</script>
