<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Licht & Optik – Übungsreise</title>
<style>
  /* ===== Grundstil ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(ellipse at top, #1a2151 0%, #0a0e2a 60%, #050816 100%);
    color: #f0f3ff;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    padding: 0;
  }

  /* Sternenhimmel-Hintergrund */
  .stars-bg {
    position: fixed; top:0; left:0; right:0; bottom:0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 60% 70%, #fff, transparent),
      radial-gradient(1px 1px at 50% 50%, #fff, transparent),
      radial-gradient(2px 2px at 80% 10%, #fff, transparent),
      radial-gradient(1px 1px at 10% 80%, #fff, transparent),
      radial-gradient(1px 1px at 90% 60%, #fff, transparent),
      radial-gradient(2px 2px at 33% 88%, #fff, transparent),
      radial-gradient(1px 1px at 70% 40%, #fff, transparent);
    background-size: 200% 200%;
    opacity: 0.4;
    animation: twinkle 8s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* ===== Kopfzeile mit Gamification ===== */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 12px 18px;
    margin-bottom: 20px;
    flex-wrap: wrap; gap: 10px;
  }
  .logo {
    font-weight: 700; font-size: 1.2em;
    background: linear-gradient(90deg, #ffd700, #ffed8a, #ffa500);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    cursor: pointer;
  }
  .stats { display:flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .stat {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.08);
    padding: 6px 12px; border-radius: 20px;
    font-size: 0.95em; font-weight: 600;
  }
  .stat .icon { font-size: 1.2em; }

  .level-bar-container {
    width: 120px; height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px; overflow: hidden;
  }
  .level-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #22d3ee);
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ===== Startseite ===== */
  .screen { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 2em; text-align: center; margin: 20px 0 10px;
    background: linear-gradient(135deg, #ffd700, #ff8a00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  h2 { font-size: 1.5em; margin-bottom: 16px; color: #ffd700; }
  .subtitle { text-align: center; color: #b8c0e5; margin-bottom: 24px; font-size: 1.05em; }

  .chapters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .chapter-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative; overflow: hidden;
    min-height: 180px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .chapter-card:hover, .chapter-card:active {
    transform: translateY(-4px);
    border-color: rgba(255,215,0,0.5);
    box-shadow: 0 10px 30px rgba(255,215,0,0.15);
  }
  .chapter-card .chap-icon { font-size: 2.5em; margin-bottom: 8px; }
  .chapter-card h3 { font-size: 1.15em; margin-bottom: 6px; color: #fff; }
  .chapter-card p { font-size: 0.9em; color: #b8c0e5; line-height: 1.4; }
  .chapter-card .chap-stars {
    margin-top: 12px; display: flex; gap: 4px; align-items: center; font-size: 1.1em;
  }
  .chapter-card .chap-progress {
    font-size: 0.85em; color: #8a94c8; margin-top: 4px;
  }

  .mode-buttons {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 8px;
  }
  .btn {
    padding: 12px 24px; border-radius: 30px; border: none;
    font-size: 1em; font-weight: 600; cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, #ffd700, #ff8a00);
    color: #1a1a2e;
  }
  .btn-primary:hover, .btn-primary:active {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255,165,0,0.4);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: #f0f3ff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-secondary:hover, .btn-secondary:active {
    background: rgba(255,255,255,0.18);
  }
  .btn-danger {
    background: rgba(255,100,100,0.15);
    color: #ffbdbd;
    border: 1px solid rgba(255,100,100,0.3);
  }

  /* ===== Kapitel-Ansicht ===== */
  .chapter-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
  }
  .back-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #f0f3ff;
    padding: 8px 16px; border-radius: 20px; cursor: pointer;
    font-size: 0.9em;
  }
  .task-counter {
    background: rgba(255,215,0,0.15);
    padding: 6px 14px; border-radius: 20px;
    font-size: 0.9em; font-weight: 600; color: #ffd700;
  }

  .task-progress {
    height: 6px; background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
    margin-bottom: 24px;
  }
  .task-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffd700, #ff8a00);
    transition: width 0.5s ease;
  }

  .task-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .task-title {
    font-size: 1.15em; margin-bottom: 16px; line-height: 1.5;
    color: #fff;
  }
  .task-type-tag {
    display: inline-block;
    background: rgba(100,200,255,0.15);
    color: #7dd3fc;
    padding: 4px 10px; border-radius: 12px;
    font-size: 0.75em; font-weight: 600;
    margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* Multiple-Choice */
  .mc-options { display: flex; flex-direction: column; gap: 10px; }
  .mc-option {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 1em;
    color: #f0f3ff;
    text-align: left;
    font-family: inherit;
  }
  .mc-option:hover:not(.disabled), .mc-option:active:not(.disabled) {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,215,0,0.5);
  }
  .mc-option.correct {
    background: rgba(74,222,128,0.2);
    border-color: #4ade80;
    color: #bbf7d0;
  }
  .mc-option.incorrect {
    background: rgba(248,113,113,0.2);
    border-color: #f87171;
    color: #fecaca;
  }
  .mc-option.disabled { cursor: not-allowed; opacity: 0.7; }

  /* Feedback-Box */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.95em;
    line-height: 1.5;
    display: none;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .feedback.show { display: block; }
  .feedback.correct {
    background: rgba(74,222,128,0.15);
    border-left: 4px solid #4ade80;
    color: #d1fae5;
  }
  .feedback.incorrect {
    background: rgba(248,113,113,0.15);
    border-left: 4px solid #f87171;
    color: #fee2e2;
  }
  .feedback strong { display: block; margin-bottom: 6px; font-size: 1.05em; }

  .task-actions {
    margin-top: 16px; display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
  }

  /* Drag & Drop */
  .dnd-container { display: flex; flex-direction: column; gap: 16px; }
  .dnd-items, .dnd-targets {
    display: flex; gap: 10px; flex-wrap: wrap;
    background: rgba(255,255,255,0.03);
    padding: 14px; border-radius: 12px;
    min-height: 70px;
    align-items: center;
  }
  .dnd-label { font-size: 0.85em; color: #b8c0e5; margin-bottom: 4px; font-weight: 600; }
  .dnd-item {
    background: linear-gradient(135deg, #4c63d4, #6b8aff);
    color: white;
    padding: 10px 16px; border-radius: 10px;
    cursor: grab; cursor: -webkit-grab;
    font-size: 0.95em; font-weight: 500;
    transition: all 0.2s ease;
    touch-action: none;
    user-select: none;
  }
  .dnd-item.dragging {
    opacity: 0.5;
    cursor: grabbing; cursor: -webkit-grabbing;
  }
  .dnd-target {
    background: rgba(255,255,255,0.06);
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 10px 16px;
    min-width: 120px;
    min-height: 46px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9em;
    color: #b8c0e5;
    transition: all 0.2s ease;
  }
  .dnd-target.hover {
    background: rgba(255,215,0,0.15);
    border-color: #ffd700;
  }
  .dnd-target.filled {
    border-style: solid;
    background: rgba(76,99,212,0.25);
    color: #fff;
  }
  .dnd-pair { display: flex; flex-direction: column; gap: 4px; }

  /* Canvas / Simulation */
  canvas {
    width: 100%;
    max-width: 100%;
    border-radius: 12px;
    background: #0a0e2a;
    border: 1px solid rgba(255,255,255,0.1);
    display: block;
    touch-action: none;
  }
  .sim-controls {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-top: 12px; align-items: center;
  }
  .sim-controls label { font-size: 0.9em; color: #b8c0e5; }
  .sim-controls input[type=range] {
    width: 140px; accent-color: #ffd700;
  }

  /* Abschlussbildschirm */
  .completion-screen {
    text-align: center; padding: 30px 20px;
  }
  .completion-stars {
    font-size: 3em; margin: 20px 0;
    animation: bounce 1s ease;
  }
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  .completion-stats {
    display: flex; justify-content: center; gap: 30px;
    margin: 20px 0; flex-wrap: wrap;
  }
  .completion-stat { text-align: center; }
  .completion-stat .num { font-size: 2em; font-weight: 700; color: #ffd700; }
  .completion-stat .lbl { font-size: 0.85em; color: #b8c0e5; }

  /* Modal / Info-Box */
  .modal-backdrop {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: linear-gradient(135deg, #1a2151, #0a0e2a);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 20px;
    padding: 30px; max-width: 500px; width: 100%;
    text-align: center;
  }
  .modal h3 { color: #ffd700; margin-bottom: 12px; font-size: 1.4em; }
  .modal p { color: #d0d8f5; margin-bottom: 16px; line-height: 1.5; }

  /* Spezielle Elemente */
  .hint-box {
    background: rgba(100,200,255,0.08);
    border-left: 3px solid #7dd3fc;
    padding: 12px 16px;
    border-radius: 8px;
    margin: 14px 0;
    font-size: 0.9em;
    color: #cae7ff;
  }
  .hint-box strong { color: #7dd3fc; }

  /* Spiegel-Eingabe */
  .mirror-input {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 1.1em;
    color: #f0f3ff;
    width: 100%;
    font-family: inherit;
  }
  .mirror-input:focus {
    outline: none;
    border-color: #ffd700;
  }
  .mirror-display {
    font-size: 1.8em;
    text-align: center;
    padding: 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    margin: 12px 0;
    letter-spacing: 2px;
    font-weight: 600;
  }

  /* Klausur-Modus */
  .exam-intro {
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .exam-intro ul { margin: 10px 0 10px 20px; color: #d0d8f5; line-height: 1.6; }

  /* Zeichnen-Canvas */
  .draw-canvas-container {
    position: relative;
    margin: 10px 0;
  }
  .draw-tools {
    display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap;
  }
  .draw-tools button {
    padding: 8px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #f0f3ff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9em;
  }
  .draw-tools button.active {
    background: rgba(255,215,0,0.2);
    border-color: #ffd700;
    color: #ffd700;
  }

  /* Badge-Animation */
  .badge-pop {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #ffd700, #ff8a00);
    color: #1a1a2e;
    padding: 20px 30px; border-radius: 20px;
    font-weight: 700; font-size: 1.2em;
    z-index: 1000;
    box-shadow: 0 10px 40px rgba(255,165,0,0.5);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .badge-pop.show { transform: translate(-50%, -50%) scale(1); }
  .badge-pop.hide { transform: translate(-50%, -50%) scale(0); }

  /* Schwierigkeits-Tag */
  .diff-tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 0.7em;
    font-weight: 600;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .diff-leicht { background: rgba(74,222,128,0.2); color: #86efac; }
  .diff-mittel { background: rgba(250,204,21,0.18); color: #fde047; }
  .diff-schwer { background: rgba(248,113,113,0.2); color: #fca5a5; }

  /* Lückentext */
  .cloze-text {
    background: rgba(255,255,255,0.04);
    padding: 18px 20px;
    border-radius: 12px;
    line-height: 2.2;
    font-size: 1.02em;
    color: #e8ecff;
  }
  .cloze-slot {
    display: inline-block;
    min-width: 100px;
    min-height: 26px;
    padding: 2px 10px;
    margin: 0 2px;
    border-bottom: 2px dashed rgba(255,215,0,0.5);
    text-align: center;
    vertical-align: middle;
    font-weight: 600;
    color: #ffd700;
    transition: all 0.2s ease;
  }
  .cloze-slot.hover {
    background: rgba(255,215,0,0.15);
    border-radius: 6px;
  }
  .cloze-slot.filled {
    border-bottom: 2px solid #7dd3fc;
    background: rgba(125,211,252,0.1);
    border-radius: 6px;
    cursor: pointer;
  }

  /* Bild-Beschriftung */
  .label-target circle, .label-target rect.hit-area {
    transition: all 0.2s ease;
  }
  .label-target.hover-target circle, .label-target.hover-target rect.hit-area {
    fill: rgba(255,215,0,0.3);
    stroke: #ffd700;
  }

  /* Memory-Spiel */
  .mem-card {
    position: relative;
    aspect-ratio: 1;
    min-height: 70px;
    cursor: pointer;
    perspective: 600px;
  }
  .mem-front, .mem-back {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    font-size: 0.8em;
    text-align: center;
    padding: 6px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transition: transform 0.5s ease;
    line-height: 1.2;
  }
  .mem-front {
    background: linear-gradient(135deg, #4c63d4, #6b8aff);
    color: #fff;
    font-size: 1.8em;
    font-weight: 700;
  }
  .mem-back {
    background: rgba(255,215,0,0.15);
    border: 2px solid #ffd700;
    color: #fff;
    transform: rotateY(180deg);
    font-weight: 500;
  }
  .mem-card.flipped .mem-front { transform: rotateY(180deg); }
  .mem-card.flipped .mem-back { transform: rotateY(0deg); }
  .mem-card.matched .mem-back {
    background: rgba(74,222,128,0.2);
    border-color: #4ade80;
    animation: matchedPulse 0.6s ease;
  }
  @keyframes matchedPulse {
    0%, 100% { transform: rotateY(0deg) scale(1); }
    50% { transform: rotateY(0deg) scale(1.08); }
  }

  /* Zeichen-Canvas */
  .draw-canvas-wrap { position: relative; }
  .draw-canvas-wrap canvas { cursor: crosshair; }
  .draw-instruction {
    background: rgba(125,211,252,0.08);
    border-left: 3px solid #7dd3fc;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 0.9em;
    color: #cae7ff;
  }

  @media (max-width: 600px) {
    h1 { font-size: 1.5em; }
    .chapter-card { min-height: 160px; padding: 16px; }
    .task-card { padding: 18px; }
    .stat { font-size: 0.85em; padding: 5px 10px; }
    .level-bar-container { width: 80px; }
  }

</style>
</head>
<body>
<div class="stars-bg"></div>
<div class="app">

  <!-- Kopfzeile -->
  <div class="topbar">
    <div class="logo" onclick="showHome()">☀ Licht &amp; Optik</div>
    <div class="stats">
      <div class="stat"><span class="icon">⭐</span><span id="totalStars">0</span>/<span id="maxStars">15</span></div>
      <div class="stat"><span class="icon">💎</span><span id="totalPoints">0</span></div>
      <div class="stat">
        <span class="icon">🚀</span>Lvl <span id="userLevel">1</span>
        <div class="level-bar-container"><div class="level-bar-fill" id="levelBar"></div></div>
      </div>
    </div>
  </div>

  <!-- Hauptinhalt -->
  <div id="content"></div>

</div>

<!-- Modals -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>
<div class="badge-pop" id="badgePop"></div>

<script>
// =========================================
// ZENTRALE DATEN & ZUSTAND
// =========================================
const state = {
  totalPoints: 0,
  chapterProgress: {}, // { chapterId: { completed: [idx], stars: n, bestScore: n } }
};

const POINTS_PER_CORRECT = 10;

// Fortschritt im Speicher halten (kein localStorage in artifacts)
function saveState() { /* nur im Speicher */ }
function loadState() { /* nichts zu tun */ }

function updateStats() {
  document.getElementById('totalPoints').textContent = state.totalPoints;
  let stars = 0;
  Object.values(state.chapterProgress).forEach(p => stars += (p.stars || 0));
  const maxStars = Object.keys(chapters).length * 3;
  document.getElementById('totalStars').textContent = stars;
  document.getElementById('maxStars').textContent = maxStars;
  // Level: je 50 Punkte ein Level
  const level = Math.floor(state.totalPoints / 50) + 1;
  const progressInLevel = (state.totalPoints % 50) / 50 * 100;
  document.getElementById('userLevel').textContent = level;
  document.getElementById('levelBar').style.width = progressInLevel + '%';
}

function showBadge(text) {
  const b = document.getElementById('badgePop');
  b.textContent = text;
  b.classList.remove('hide');
  b.classList.add('show');
  setTimeout(() => {
    b.classList.remove('show');
    b.classList.add('hide');
  }, 1800);
}

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalBackdrop').classList.add('show');
}
function closeModal(evt) {
  if (evt && evt.target.id !== 'modalBackdrop') return;
  document.getElementById('modalBackdrop').classList.remove('show');
}
function closeModalForce() {
  document.getElementById('modalBackdrop').classList.remove('show');
}

// =========================================
// STARTSEITE
// =========================================
function showHome() {
  const content = document.getElementById('content');
  const chapterList = Object.entries(chapters).map(([id, ch]) => {
    const prog = state.chapterProgress[id] || { stars: 0, completed: [] };
    const totalTasks = ch.tasks.length;
    const done = prog.completed ? prog.completed.length : 0;
    const starDisplay = '★'.repeat(prog.stars || 0) + '☆'.repeat(3 - (prog.stars || 0));
    return `
      <div class="chapter-card" onclick="startChapter('${id}')">
        <div>
          <div class="chap-icon">${ch.icon}</div>
          <h3>${ch.title}</h3>
          <p>${ch.desc}</p>
        </div>
        <div>
          <div class="chap-stars" style="color:#ffd700">${starDisplay}</div>
          <div class="chap-progress">${done}/${totalTasks} Aufgaben</div>
        </div>
      </div>
    `;
  }).join('');

  content.innerHTML = `
    <div class="screen">
      <h1>Entdecke die Welt des Lichts</h1>
      <p class="subtitle">Übe spielerisch für deine Klassenarbeit. Wähle ein Kapitel oder stelle dich dem Klausur-Modus!</p>
      <div class="chapters-grid">${chapterList}</div>
      <div class="mode-buttons">
        <button class="btn btn-primary" onclick="startExam()">🎯 Klausur-Modus starten</button>
        <button class="btn btn-secondary" onclick="resetProgress()">Fortschritt zurücksetzen</button>
      </div>
    </div>
  `;
  updateStats();
}

function resetProgress() {
  openModal(`
    <h3>Wirklich zurücksetzen?</h3>
    <p>Alle Sterne und Punkte gehen verloren.</p>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
      <button class="btn btn-danger" onclick="doReset()">Ja, zurücksetzen</button>
      <button class="btn btn-secondary" onclick="closeModalForce()">Abbrechen</button>
    </div>
  `);
}
function doReset() {
  state.totalPoints = 0;
  state.chapterProgress = {};
  closeModalForce();
  showHome();
}

// =========================================
// KAPITEL-AUSFÜHRUNG (wird später befüllt)
// =========================================
let currentChapter = null;
let currentTaskIndex = 0;
let currentSessionCorrect = 0;
let isExamMode = false;
let examTasks = [];

function startChapter(id) {
  isExamMode = false;
  currentChapter = id;
  currentTaskIndex = 0;
  currentSessionCorrect = 0;
  // Fortschritt für dieses Kapitel initialisieren
  if (!state.chapterProgress[id]) {
    state.chapterProgress[id] = { stars: 0, completed: [], bestScore: 0 };
  }
  renderCurrentTask();
}

function startExam() {
  isExamMode = true;
  currentTaskIndex = 0;
  currentSessionCorrect = 0;
  // Für Klausurmodus: aus jedem Kapitel 2 zufällige Aufgaben (10 insgesamt)
  examTasks = [];
  Object.entries(chapters).forEach(([id, ch]) => {
    const shuffled = [...ch.tasks].sort(() => Math.random() - 0.5);
    shuffled.slice(0, 2).forEach(t => examTasks.push({ ...t, _chapter: id }));
  });
  // Nochmal insgesamt mischen
  examTasks = examTasks.sort(() => Math.random() - 0.5);
  renderCurrentTask();
}

function getCurrentTasks() {
  return isExamMode ? examTasks : chapters[currentChapter].tasks;
}

function renderCurrentTask() {
  const tasks = getCurrentTasks();
  if (currentTaskIndex >= tasks.length) {
    renderCompletion();
    return;
  }
  const task = tasks[currentTaskIndex];
  const content = document.getElementById('content');
  const title = isExamMode ? '🎯 Klausur-Modus' : chapters[currentChapter].title;
  const progressPct = (currentTaskIndex / tasks.length) * 100;

  content.innerHTML = `
    <div class="screen">
      <div class="chapter-header">
        <button class="back-btn" onclick="showHome()">← Zurück</button>
        <div class="task-counter">${title} – ${currentTaskIndex+1}/${tasks.length}</div>
      </div>
      <div class="task-progress"><div class="task-progress-fill" style="width:${progressPct}%"></div></div>
      <div class="task-card" id="taskCard">
        <div>
          <span class="task-type-tag">${task.typeLabel || 'Aufgabe'}</span>
          ${task.difficulty ? `<span class="diff-tag diff-${task.difficulty}">${task.difficulty}</span>` : ''}
        </div>
        <div class="task-title" style="margin-top:10px;">${task.question}</div>
        <div id="taskBody"></div>
        <div class="feedback" id="feedback"></div>
        <div class="task-actions" id="taskActions"></div>
      </div>
    </div>
  `;

  // Aufgaben-Spezifisch rendern
  task.render();
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'incorrect');
  fb.innerHTML = (correct ? '<strong>✓ Richtig!</strong>' : '<strong>✗ Nicht ganz richtig.</strong>') + explanation;

  if (correct) {
    state.totalPoints += POINTS_PER_CORRECT;
    currentSessionCorrect++;
    if (!isExamMode) {
      const prog = state.chapterProgress[currentChapter];
      if (!prog.completed.includes(currentTaskIndex)) {
        prog.completed.push(currentTaskIndex);
      }
    }
    updateStats();
  }
  // Weiter-Button
  const actions = document.getElementById('taskActions');
  actions.innerHTML = `<button class="btn btn-primary" onclick="nextTask()">Weiter →</button>`;
}

function nextTask() {
  currentTaskIndex++;
  renderCurrentTask();
}

function renderCompletion() {
  const tasks = getCurrentTasks();
  const total = tasks.length;
  const pct = currentSessionCorrect / total;
  let stars = 0;
  if (pct >= 0.95) stars = 3;
  else if (pct >= 0.75) stars = 2;
  else if (pct >= 0.5) stars = 1;

  let title, message;
  if (isExamMode) {
    title = 'Klausur-Modus beendet!';
    message = `Du hast <strong>${currentSessionCorrect} von ${total}</strong> Aufgaben richtig gelöst.`;
    if (pct >= 0.9) {
      showBadge('🏆 Optik-Meister!');
    } else if (pct >= 0.7) {
      showBadge('🌟 Starke Leistung!');
    }
  } else {
    title = `Kapitel geschafft: ${chapters[currentChapter].title}`;
    message = `Du hast <strong>${currentSessionCorrect} von ${total}</strong> Aufgaben richtig gelöst.`;
    const prog = state.chapterProgress[currentChapter];
    if (stars > prog.stars) {
      prog.stars = stars;
      showBadge(`✨ ${stars} Sterne erreicht!`);
    }
  }

  const starsDisplay = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('content').innerHTML = `
    <div class="screen completion-screen">
      <h1>${title}</h1>
      <div class="completion-stars" style="color:#ffd700">${starsDisplay}</div>
      <p class="subtitle">${message}</p>
      <div class="completion-stats">
        <div class="completion-stat">
          <div class="num">${currentSessionCorrect}/${total}</div>
          <div class="lbl">Richtig</div>
        </div>
        <div class="completion-stat">
          <div class="num">+${currentSessionCorrect * POINTS_PER_CORRECT}</div>
          <div class="lbl">Punkte</div>
        </div>
      </div>
      <div class="mode-buttons">
        <button class="btn btn-secondary" onclick="${isExamMode ? 'startExam()' : `startChapter('${currentChapter}')`}">Nochmal</button>
        <button class="btn btn-primary" onclick="showHome()">Zur Übersicht</button>
      </div>
    </div>
  `;
  updateStats();
}

// =========================================
// AUFGABEN-HELFER
// =========================================

// Multiple-Choice Aufgabe - robuste Variante (ohne String-Escaping-Probleme)
function renderMC(options, correctIdx, explanation) {
  const body = document.getElementById('taskBody');
  // Zustand in window-Variable speichern, damit Event-Handler darauf zugreifen können
  window._mcState = { correctIdx, explanation };
  body.innerHTML = `
    <div class="mc-options">
      ${options.map((opt, i) => `<button class="mc-option" data-idx="${i}">${opt}</button>`).join('')}
    </div>
  `;
  // Event-Listener direkt an die Buttons hängen (keine onclick-Strings)
  body.querySelectorAll('.mc-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const selected = parseInt(btn.dataset.idx);
      selectMC(selected);
    });
  });
}
function selectMC(selected) {
  const { correctIdx, explanation } = window._mcState;
  document.querySelectorAll('.mc-option').forEach((el, i) => {
    el.classList.add('disabled');
    el.onclick = null;
    // Neue Listener entfernen durch cloneNode
    const clone = el.cloneNode(true);
    el.parentNode.replaceChild(clone, el);
    if (i === correctIdx) clone.classList.add('correct');
    else if (i === selected && selected !== correctIdx) clone.classList.add('incorrect');
  });
  showFeedback(selected === correctIdx, explanation);
}

// True/False Aufgabe (mehrere Aussagen)
function renderTrueFalse(statements, explanation) {
  // statements: [{ text, correct: true/false }]
  const body = document.getElementById('taskBody');
  body.innerHTML = `
    <div style="display:flex; flex-direction:column; gap:10px;">
      ${statements.map((s, i) => `
        <div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px;">
          <div style="margin-bottom:8px;">${s.text}</div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-secondary tf-btn" data-i="${i}" data-v="true" onclick="selectTF(${i}, true)">✓ Richtig</button>
            <button class="btn btn-secondary tf-btn" data-i="${i}" data-v="false" onclick="selectTF(${i}, false)">✗ Falsch</button>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:12px;">
      <button class="btn btn-primary" id="tfCheckBtn" onclick="checkTF()" disabled style="opacity:0.5">Prüfen</button>
    </div>
  `;
  // State tracking
  window._tfState = { statements, answers: {}, explanation };
}

function selectTF(idx, value) {
  window._tfState.answers[idx] = value;
  document.querySelectorAll(`.tf-btn[data-i="${idx}"]`).forEach(b => {
    b.style.background = '';
    b.style.borderColor = '';
    if (b.dataset.v === String(value)) {
      b.style.background = 'rgba(255,215,0,0.2)';
      b.style.borderColor = '#ffd700';
    }
  });
  // Check if all answered
  if (Object.keys(window._tfState.answers).length === window._tfState.statements.length) {
    const btn = document.getElementById('tfCheckBtn');
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

function checkTF() {
  const s = window._tfState;
  let allCorrect = true;
  s.statements.forEach((stmt, i) => {
    if (s.answers[i] !== stmt.correct) allCorrect = false;
  });
  // Visualisierung
  s.statements.forEach((stmt, i) => {
    document.querySelectorAll(`.tf-btn[data-i="${i}"]`).forEach(b => {
      b.disabled = true;
      if (b.dataset.v === String(stmt.correct)) {
        b.style.background = 'rgba(74,222,128,0.25)';
        b.style.borderColor = '#4ade80';
      } else if (b.dataset.v === String(s.answers[i]) && s.answers[i] !== stmt.correct) {
        b.style.background = 'rgba(248,113,113,0.25)';
        b.style.borderColor = '#f87171';
      }
    });
  });
  document.getElementById('tfCheckBtn').style.display = 'none';
  showFeedback(allCorrect, s.explanation);
}

// Text-Eingabe (z.B. Spiegelschrift) - robuste Variante
function renderTextInput(correctAnswer, explanation, options = {}) {
  const body = document.getElementById('taskBody');
  // State in window speichern
  window._textState = { correctAnswer, explanation, options };
  body.innerHTML = `
    ${options.mirrorDisplay ? `<div class="mirror-display" id="mirrorDisplay">${options.mirrorDisplay}</div>` : ''}
    <input type="text" class="mirror-input" id="textAnswer" placeholder="${options.placeholder || 'Deine Antwort...'}" autocomplete="off">
    <div style="margin-top:12px;">
      <button class="btn btn-primary" id="textCheckBtn">Prüfen</button>
    </div>
  `;
  document.getElementById('textCheckBtn').addEventListener('click', checkTextInput);
  setTimeout(() => document.getElementById('textAnswer').focus(), 100);
}

function checkTextInput() {
  const { correctAnswer, explanation } = window._textState;
  const input = document.getElementById('textAnswer').value.trim();
  let normalize = s => s.toLowerCase().replace(/\s+/g,' ').trim();
  const correctAnswers = Array.isArray(correctAnswer) ? correctAnswer : [correctAnswer];
  const ok = correctAnswers.some(c => normalize(c) === normalize(input));
  document.getElementById('textAnswer').disabled = true;
  showFeedback(ok, explanation + (ok ? '' : `<br><br><em>Richtige Antwort: <strong>${correctAnswers[0]}</strong></em>`));
}

<script id="chaptersScript">
// =========================================
// KAPITEL 1: SCHATTEN & LICHTQUELLEN
// =========================================
const chapter_schatten = {
  icon: '🌑',
  title: 'Schatten & Lichtquellen',
  desc: 'Kern- und Halbschatten, punktförmige und flächenförmige Lichtquellen',
  tasks: [
    {
      typeLabel: 'Quiz',
      difficulty: 'leicht',
      question: 'Was passiert, wenn das Licht einer <strong>punktförmigen Lichtquelle</strong> auf einen Gegenstand trifft?',
      render() {
        renderMC(
          [
            'Es entsteht nur ein Halbschatten.',
            'Es entsteht nur ein scharf begrenzter Kernschatten.',
            'Es entstehen Kernschatten und Halbschatten nebeneinander.',
            'Es entsteht gar kein Schatten.'
          ],
          1,
          'Eine punktförmige Lichtquelle sendet Licht nur aus einem einzigen Punkt aus. Dahinter kann das Licht den Gegenstand entweder vollständig umgehen oder wird vollständig blockiert – es entsteht nur ein scharf begrenzter Kernschatten, aber kein Halbschatten.'
        );
      }
    },
    {
      typeLabel: 'Simulation',
      difficulty: 'mittel',
      question: 'Bewege den Schieberegler und beobachte, was passiert. Erkläre danach: Was ist der Unterschied zwischen punktförmiger und flächenförmiger Lichtquelle?',
      render() {
        const body = document.getElementById('taskBody');
        body.innerHTML = `
          <canvas id="shadowCanvas" width="500" height="280"></canvas>
          <div class="sim-controls">
            <label>Ausdehnung der Lichtquelle:</label>
            <input type="range" id="lightSize" min="0" max="80" value="0">
            <span id="lightLabel">punktförmig</span>
          </div>
          <div class="hint-box"><strong>💡 Tipp:</strong> Bei 0 ist die Lichtquelle ein Punkt, bei höheren Werten eine Fläche (z.B. Lampe).</div>
        `;
        const canvas = document.getElementById('shadowCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('lightSize');
        const label = document.getElementById('lightLabel');
        function draw() {
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0,0,w,h);
          ctx.fillStyle = '#0a0e2a';
          ctx.fillRect(0,0,w,h);

          const lightSize = parseInt(slider.value);
          const lightX = 60, lightY = h/2;
          const objX = 220, objY = h/2, objR = 30;
          const wallX = 400;

          // Wand zeichnen
          ctx.fillStyle = '#3a4170';
          ctx.fillRect(wallX, 20, 8, h-40);

          // Schatten auf der Wand berechnen
          if (lightSize === 0) {
            // Punktförmig: nur Kernschatten
            const topY = objY - objR;
            const botY = objY + objR;
            const tan_t = (topY - lightY) / (objX - lightX);
            const tan_b = (botY - lightY) / (objX - lightX);
            const shadowTop = lightY + tan_t * (wallX - lightX);
            const shadowBot = lightY + tan_b * (wallX - lightX);
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.beginPath();
            ctx.moveTo(objX, topY);
            ctx.lineTo(wallX, shadowTop);
            ctx.lineTo(wallX, shadowBot);
            ctx.lineTo(objX, botY);
            ctx.closePath();
            ctx.fill();
          } else {
            // Flächenförmig: Kernschatten + Halbschatten
            const L_top_y = lightY - lightSize/2;
            const L_bot_y = lightY + lightSize/2;
            const objTop = objY - objR, objBot = objY + objR;
            const outerTopY = L_bot_y + (objTop - L_bot_y) / (objX - lightX) * (wallX - lightX);
            const outerBotY = L_top_y + (objBot - L_top_y) / (objX - lightX) * (wallX - lightX);
            const innerTopY = L_top_y + (objTop - L_top_y) / (objX - lightX) * (wallX - lightX);
            const innerBotY = L_bot_y + (objBot - L_bot_y) / (objX - lightX) * (wallX - lightX);

            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.moveTo(objX, objTop);
            ctx.lineTo(wallX, outerTopY);
            ctx.lineTo(wallX, outerBotY);
            ctx.lineTo(objX, objBot);
            ctx.closePath();
            ctx.fill();
            if (innerTopY < innerBotY) {
              ctx.fillStyle = 'rgba(0,0,0,0.9)';
              ctx.beginPath();
              ctx.moveTo(objX, objTop);
              ctx.lineTo(wallX, innerTopY);
              ctx.lineTo(wallX, innerBotY);
              ctx.lineTo(objX, objBot);
              ctx.closePath();
              ctx.fill();
            }
          }

          // Lichtquelle
          ctx.fillStyle = '#ffd700';
          if (lightSize === 0) {
            ctx.beginPath();
            ctx.arc(lightX, lightY, 6, 0, Math.PI*2);
            ctx.fill();
          } else {
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 15;
            ctx.fillRect(lightX-4, lightY - lightSize/2, 8, lightSize);
            ctx.shadowBlur = 0;
          }

          // Objekt (Kugel)
          ctx.fillStyle = '#6b8aff';
          ctx.beginPath();
          ctx.arc(objX, objY, objR, 0, Math.PI*2);
          ctx.fill();

          // Beschriftungen
          ctx.fillStyle = '#fff';
          ctx.font = '12px sans-serif';
          ctx.fillText('Lichtquelle', lightX-25, lightY - lightSize/2 - 12);
          ctx.fillText('Gegenstand', objX-30, objY + objR + 20);
          ctx.fillText('Wand', wallX+12, 40);

          label.textContent = lightSize === 0 ? 'punktförmig' : `flächenförmig (${lightSize})`;
        }
        slider.oninput = draw;
        draw();

        document.getElementById('taskActions').innerHTML = `
          <button class="btn btn-primary" onclick="afterShadowSim()">Ich habe es beobachtet →</button>
        `;
        window.afterShadowSim = function() {
          renderMC(
            [
              'Eine flächenförmige Lichtquelle erzeugt nur Kernschatten.',
              'Eine flächenförmige Lichtquelle erzeugt Kernschatten und zusätzlich einen Halbschatten.',
              'Eine punktförmige Lichtquelle erzeugt immer einen Halbschatten.',
              'Beide Lichtquellen erzeugen denselben Schatten.'
            ],
            1,
            'Weil eine flächenförmige Lichtquelle aus vielen einzelnen "Punkten" besteht, entstehen am Rand Bereiche, die nur von einem Teil der Lichtquelle erreicht werden – das ist der Halbschatten. Der vollständig dunkle Bereich in der Mitte ist der Kernschatten.'
          );
          document.getElementById('taskActions').innerHTML = '';
        };
      }
    },
    {
      typeLabel: 'Zeichnen',
      difficulty: 'mittel',
      question: 'Zeichne die <strong>beiden Begrenzungsstrahlen</strong> des Kernschattens! Ziehe mit dem Finger/der Maus von der Lichtquelle bis zur Wand, sodass die Strahlen den Ball gerade so streifen.',
      render() {
        renderDrawing((container) => {
          container.innerHTML = `
            <div class="draw-instruction"><strong>So geht's:</strong> Lege den Finger auf die Lichtquelle und ziehe eine gerade Linie bis zur Wand, die oben am Ball vorbeigeht. Dann den zweiten Strahl, der unten am Ball vorbeigeht. Die Punkte rasten ein!</div>
            <canvas id="shadowDrawCanvas" width="500" height="320"></canvas>
            <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
              <span style="font-size:0.85em; color:#b8c0e5;">Strahlen: <strong id="shadowRayCount" style="color:#ffd700">0 / 2</strong></span>
              <div style="flex:1"></div>
              <button class="btn btn-secondary" id="shadowResetBtn">Zurücksetzen</button>
              <button class="btn btn-primary" id="shadowCheckBtn">Prüfen</button>
            </div>
          `;
          const canvas = document.getElementById('shadowDrawCanvas');
          const ctx = canvas.getContext('2d');
          // Setup
          const lightX = 60, lightY = 160;
          const objX = 220, objY = 160, objR = 32;
          const wallX = 420, wallTop = 30, wallBot = 290;
          // Korrekte Schattenpunkte auf der Wand
          const shadowTop = lightY + (objY - objR - lightY) / (objX - lightX) * (wallX - lightX);
          const shadowBot = lightY + (objY + objR - lightY) / (objX - lightX) * (wallX - lightX);
          // Snap-Punkte: Lichtquelle und verschiedene Wandpunkte
          const snapPoints = [
            { x: lightX, y: lightY, id: 'light' }
          ];

          let rays = []; // {start:{x,y}, end:{x,y}}
          let currentRay = null;
          let drawing = false;

          function draw() {
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = '#0a0e2a';
            ctx.fillRect(0,0,w,h);
            // Wand
            ctx.fillStyle = '#3a4170';
            ctx.fillRect(wallX, wallTop, 8, wallBot - wallTop);
            // Skala auf der Wand
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            for (let y = wallTop; y <= wallBot; y += 20) {
              ctx.beginPath();
              ctx.moveTo(wallX + 8, y); ctx.lineTo(wallX + 12, y);
              ctx.stroke();
            }
            // Lichtquelle
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 12;
            ctx.beginPath(); ctx.arc(lightX, lightY, 9, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = '12px sans-serif';
            ctx.fillText('Lichtquelle', lightX-30, lightY-18);
            // Objekt
            ctx.fillStyle = '#6b8aff';
            ctx.beginPath(); ctx.arc(objX, objY, objR, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.fillText('Ball', objX-10, objY+objR+16);
            ctx.fillText('Wand', wallX+16, 45);
            // Gezeichnete Strahlen
            rays.forEach(r => {
              ctx.strokeStyle = '#ffd700';
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(r.start.x, r.start.y);
              ctx.lineTo(r.end.x, r.end.y);
              ctx.stroke();
              // Endpunkt markieren
              ctx.fillStyle = '#ffd700';
              ctx.beginPath(); ctx.arc(r.end.x, r.end.y, 5, 0, Math.PI*2); ctx.fill();
            });
            // Gerade gezeichneter Strahl (während des Ziehens)
            if (currentRay) {
              ctx.strokeStyle = 'rgba(255,215,0,0.6)';
              ctx.lineWidth = 3;
              ctx.setLineDash([6,3]);
              ctx.beginPath();
              ctx.moveTo(currentRay.start.x, currentRay.start.y);
              ctx.lineTo(currentRay.end.x, currentRay.end.y);
              ctx.stroke();
              ctx.setLineDash([]);
              // Hilfsanzeige: "Snap" wenn nah an Lichtquelle zum Start, oder wenn Endpunkt auf Wand
              ctx.fillStyle = 'rgba(255,215,0,0.4)';
              ctx.beginPath();
              ctx.arc(currentRay.end.x, currentRay.end.y, 6, 0, Math.PI*2);
              ctx.fill();
            }
            // Startpunkt-Hervorhebung
            if (rays.length < 2 && !drawing) {
              ctx.strokeStyle = 'rgba(255,215,0,0.4)';
              ctx.lineWidth = 2;
              ctx.setLineDash([3,3]);
              ctx.beginPath();
              ctx.arc(lightX, lightY, 18, 0, Math.PI*2);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.fillStyle = 'rgba(255,255,255,0.35)';
              ctx.font = '11px sans-serif';
              ctx.fillText('← Hier starten, dann zur Wand ziehen', lightX+22, lightY+5);
            }
            // Dezente "Ziel-Indikatoren" auf der Wand (helfen beim Anvisieren)
            if (rays.length < 2 && !currentRay) {
              [shadowTop, shadowBot].forEach(sy => {
                ctx.fillStyle = 'rgba(255,215,0,0.2)';
                ctx.beginPath();
                ctx.arc(wallX, sy, 8, 0, Math.PI*2); ctx.fill();
              });
            }
            document.getElementById('shadowRayCount').textContent = `${rays.length} / 2`;
          }

          function startDraw(e) {
            if (window._shadowAnswered || rays.length >= 2) return;
            e.preventDefault();
            const p = getCanvasPos(canvas, e);
            // Nur starten, wenn nah an der Lichtquelle
            if (Math.hypot(p.x - lightX, p.y - lightY) > 30) return;
            drawing = true;
            currentRay = { start: { x: lightX, y: lightY }, end: { x: lightX, y: lightY } };
            draw();
          }
          function moveDraw(e) {
            if (!drawing || !currentRay) return;
            e.preventDefault();
            const p = getCanvasPos(canvas, e);
            // Den Endpunkt auf die Wand projizieren, wenn in der Nähe
            let endX = p.x, endY = p.y;
            // Wenn User nah am Wandbereich ist, snap auf die Wand
            if (p.x > wallX - 20) {
              const dx = p.x - lightX;
              if (dx > 0) {
                const t = (wallX - lightX) / dx;
                endX = wallX;
                endY = lightY + (p.y - lightY) * t;
                endY = Math.max(wallTop, Math.min(wallBot, endY));
              }
            }
            // Tangenten-Snap: Wenn die Linie nah an einer der korrekten Tangenten ist, einrasten
            // Korrekte Tangenten: shadowTop und shadowBot auf der Wand
            const snapDist = 20;
            if (Math.abs(endY - shadowTop) < snapDist && endX >= wallX - 5) {
              endX = wallX;
              endY = shadowTop;
            } else if (Math.abs(endY - shadowBot) < snapDist && endX >= wallX - 5) {
              endX = wallX;
              endY = shadowBot;
            }
            currentRay.end = { x: endX, y: endY };
            draw();
          }
          function endDraw(e) {
            if (!drawing || !currentRay) return;
            drawing = false;
            // Nur akzeptieren, wenn Endpunkt wirklich auf der Wand ist
            if (currentRay.end.x >= wallX - 5 && currentRay.end.y >= wallTop && currentRay.end.y <= wallBot) {
              // Auf Wand snappen
              currentRay.end.x = wallX;
              rays.push(currentRay);
            }
            currentRay = null;
            draw();
          }
          canvas.addEventListener('mousedown', startDraw);
          canvas.addEventListener('mousemove', moveDraw);
          canvas.addEventListener('mouseup', endDraw);
          canvas.addEventListener('touchstart', startDraw, {passive:false});
          canvas.addEventListener('touchmove', moveDraw, {passive:false});
          canvas.addEventListener('touchend', endDraw);

          document.getElementById('shadowResetBtn').addEventListener('click', () => {
            rays = []; currentRay = null;
            window._shadowAnswered = false;
            document.getElementById('shadowCheckBtn').disabled = false;
            draw();
          });
          document.getElementById('shadowCheckBtn').addEventListener('click', () => {
            if (rays.length !== 2) {
              alert('Bitte zeichne beide Begrenzungsstrahlen.');
              return;
            }
            window._shadowAnswered = true;
            document.getElementById('shadowCheckBtn').disabled = true;
            // Prüfe: Tangential am Ball vorbei (Abstand vom Linie-zu-Mittelpunkt ≈ objR)
            // Abstand Punkt zu Strecke berechnen
            function distPointToLine(px, py, x1, y1, x2, y2) {
              const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
              const dot = A*C + B*D;
              const lenSq = C*C + D*D;
              const param = lenSq ? dot / lenSq : -1;
              let xx, yy;
              if (param < 0) { xx = x1; yy = y1; }
              else if (param > 1) { xx = x2; yy = y2; }
              else { xx = x1 + param*C; yy = y1 + param*D; }
              return Math.hypot(px - xx, py - yy);
            }
            // Für jeden Strahl: Abstand zur Objektmitte ≈ objR (mit Toleranz)
            // Und unterscheiden, ob oberer oder unterer Strahl
            const tolerance = 18; // Pixel - großzügiger für bessere Bedienbarkeit
            let upperOk = false, lowerOk = false;
            rays.forEach(r => {
              const d = distPointToLine(objX, objY, r.start.x, r.start.y, r.end.x, r.end.y);
              if (Math.abs(d - objR) < tolerance) {
                // Oben oder unten?
                const tForObj = (objX - r.start.x) / (r.end.x - r.start.x);
                const yAtObj = r.start.y + tForObj * (r.end.y - r.start.y);
                if (yAtObj < objY) upperOk = true;
                else lowerOk = true;
              }
            });
            const ok = upperOk && lowerOk;
            // Korrekte Strahlen einzeichnen
            ctx.strokeStyle = 'rgba(74,222,128,0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([3,3]);
            ctx.beginPath();
            ctx.moveTo(lightX, lightY); ctx.lineTo(wallX, shadowTop);
            ctx.moveTo(lightX, lightY); ctx.lineTo(wallX, shadowBot);
            ctx.stroke();
            ctx.setLineDash([]);
            // Schattenbereich markieren
            ctx.fillStyle = 'rgba(74,222,128,0.25)';
            ctx.fillRect(wallX - 2, shadowTop, 12, shadowBot - shadowTop);
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 1;
            ctx.strokeRect(wallX - 2, shadowTop, 12, shadowBot - shadowTop);
            ctx.fillStyle = '#4ade80';
            ctx.font = 'bold 11px sans-serif';
            ctx.fillText('Kernschatten', wallX + 16, (shadowTop + shadowBot)/2);
            showFeedback(ok, 'Licht breitet sich <strong>geradlinig</strong> aus. Die Schattengrenzen findest du, indem du von der Lichtquelle aus gerade Linien <strong>tangential</strong> (streifend) am Ball vorbei zur Wand ziehst. Zwischen diesen beiden Strahlen liegt der Kernschatten – dort kommt kein Licht hin.');
          });
          draw();
        });
      }

            ctx.beginPath();

          const sunX = 70, sunY = h/2;

          // Erde (Mitte)

          // Tag-Seite
          ctx.save();

          ctx.fillStyle = '#4a9eff';
          ctx.fill();
          ctx.restore();
          // Nacht-Seite

          ctx.beginPath();
          ctx.arc(earthX, earthY, earthR, Math.PI/2, 3*Math.PI/2);
          ctx.fillStyle = '#0c1440';
          ctx.fill();

          ctx.arc(markerX, markerY, 7, 0, Math.PI*2);

          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();

          // Tag/Nacht Bestimmung
          // Wenn markerX < earthX => Tag-Seite, wenn > earthX => Nacht-Seite
          // Genauer: cos(rot) < 0 => Tag, > 0 => Nacht (weil Sonne links)
          const isDayTime = Math.cos(rot) < 0;

          ctx.restore();

          ctx.arc(moonX, moonY, 22, Math.PI/2, 3*Math.PI/2);
          ctx.fillStyle = '#3a3a5a';
          ctx.fill();
          ctx.restore();

          ctx.font = '13px sans-serif';
          ctx.fillText('☀ Sonne', sunX-20, sunY-55);
          ctx.fillText('🌍 Erde', earthX-20, earthY-earthR-10);
          ctx.fillText('🌙 Mond', moonX-22, moonY-30);
          ctx.fillStyle = '#ff6b6b';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText('Du', markerX+10, markerY-5);
        }

          ctx.lineTo(x2 - size*Math.cos(ang + Math.PI/6), y2 - size*Math.sin(ang + Math.PI/6));
          ctx.closePath();
          ctx.fill();

          let protractorDrag = null; // {mode: 'move'|'rotate', startX, startY}

          function drawBg() {
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = '#0a0e2a';
            ctx.fillRect(0,0,w,h);

            ctx.moveTo(pivotX, mirrorY - 230);
            ctx.lineTo(pivotX, mirrorY + 20);

            ctx.setLineDash([]);

            // Winkelskala am Lot - alle 5°
            for (let a = 5; a <= 80; a += 5) {

              const ly1 = pivotY - Math.cos(ar) * 70;

          }

          function drawProtractor() {
            if (!showProtractor) return;
            const w = canvas.width;
            const R = 100;
            ctx.save();
            ctx.translate(protPos.x, protPos.y);
            ctx.rotate(protPos.rotation);
            // Halbkreis-Hintergrund (nach oben)
            ctx.fillStyle = 'rgba(255, 240, 200, 0.18)';
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.95)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, R, Math.PI, 2*Math.PI, false);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // Grundlinie
            ctx.beginPath();
            ctx.moveTo(-R, 0); ctx.lineTo(R, 0);
            ctx.stroke();
            // Gradmarkierungen alle 5° von 0..180° (unser 0° = rechts)
            for (let deg = 0; deg <= 180; deg += 5) {
              const theta = Math.PI - deg * Math.PI / 180; // 0°=rechts, 180°=links, 90°=oben
              const px = Math.cos(theta) * R;
              const py = -Math.sin(theta) * R; // oben = negativer y
              const isMajor = deg % 10 === 0;
              const tickLen = isMajor ? 10 : 5;
              const ix = Math.cos(theta) * (R - tickLen);
              const iy = -Math.sin(theta) * (R - tickLen);
              ctx.strokeStyle = isMajor ? 'rgba(200, 150, 50, 1)' : 'rgba(200, 150, 50, 0.6)';
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(ix, iy); ctx.lineTo(px, py);
              ctx.stroke();
              if (isMajor && deg % 30 === 0) {
                ctx.fillStyle = '#4a3000';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                const lx = Math.cos(theta) * (R - 22);
                const ly = -Math.sin(theta) * (R - 22);
                ctx.fillText(deg.toString(), lx, ly + 3);
              }
            }
            // Senkrechtes Lot-Markierungsstrich
            ctx.strokeStyle = 'rgba(200, 150, 50, 0.8)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(0, -R+8);
            ctx.stroke();
            ctx.fillStyle = '#4a3000';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('90°', 0, -R+22);
            // Mittelpunkt (Bezugspunkt)
            ctx.fillStyle = '#ff6b6b';

            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
            ctx.restore();
            // Drag-Griff (oben am Geodreieck, in Rotationsrichtung)
            const handleDist = 110;
            const handleX = protPos.x + Math.sin(protPos.rotation) * handleDist;
            const handleY = protPos.y - Math.cos(protPos.rotation) * handleDist;
            ctx.fillStyle = 'rgba(74,222,128,0.9)';
            ctx.beginPath(); ctx.arc(handleX, handleY, 8, 0, Math.PI*2); ctx.fill();

          }

          function draw() {
            drawBg();
            // User-Strahl
            if (userRay) {
              ctx.strokeStyle = userRay.snapped ? '#4ade80' : '#ff6b6b';
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(pivotX, pivotY);
              ctx.lineTo(userRay.end.x, userRay.end.y);
              ctx.stroke();
              drawArrowhead(ctx, pivotX, pivotY, userRay.end.x, userRay.end.y, userRay.snapped ? '#4ade80' : '#ff6b6b');

              const userAngRad = currentAngle * Math.PI / 180;
              if (userAngRad > 0) {
                ctx.strokeStyle = userRay.snapped ? '#4ade80' : '#ff6b6b';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(pivotX, pivotY, 50, -Math.PI/2, -Math.PI/2 + userAngRad);
                ctx.stroke();
              }
            }
            // Geodreieck
            drawProtractor();
            // Große Winkel-Live-Anzeige oben rechts
            if (currentAngle !== null) {
              const diff = Math.abs(currentAngle - targetAngle);
              const angleColor = diff < 2 ? '#4ade80' : (diff < 6 ? '#ffd700' : '#ff6b6b');
              ctx.fillStyle = 'rgba(0,0,0,0.75)';
              ctx.fillRect(canvas.width - 140, 30, 125, 52);
              ctx.strokeStyle = angleColor;
              ctx.lineWidth = 2;
              ctx.strokeRect(canvas.width - 140, 30, 125, 52);
              ctx.fillStyle = '#b8c0e5';
              ctx.font = '10px sans-serif';
              ctx.textAlign = 'left';
              ctx.fillText('Dein Winkel β:', canvas.width - 132, 46);
              ctx.fillStyle = angleColor;
              ctx.font = 'bold 24px sans-serif';
              ctx.fillText(currentAngle.toFixed(0) + '°', canvas.width - 128, 72);
              ctx.fillStyle = '#b8c0e5';
              ctx.font = '10px sans-serif';
              ctx.fillText('Ziel: ' + targetAngle + '°', canvas.width - 60, 72);
            }
            // Start-Hinweis
            if (!userRay && !drawing) {
              ctx.strokeStyle = 'rgba(255,107,107,0.6)';
              ctx.lineWidth = 2;
              ctx.setLineDash([3,3]);
              ctx.beginPath();
              ctx.arc(pivotX, pivotY, 20, 0, Math.PI*2);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.fillStyle = 'rgba(255,255,255,0.4)';
              ctx.font = '11px sans-serif';
              ctx.textAlign = 'left';
              ctx.fillText('↑ Von hier schräg nach oben ziehen', pivotX + 26, pivotY + 5);
            }
          }

          function updateAngle() {
            if (!userRay) { currentAngle = null; return; }
            let ang = angleFromVertical(pivotX, pivotY, userRay.end.x, userRay.end.y);
            // Snap auf 5°-Schritte wenn nah dran (<2°)
            const near5 = Math.round(ang / 5) * 5;
            if (Math.abs(ang - near5) < 2) {
              ang = near5;
              userRay.snapped = true;
              // Endpunkt exakt auf Winkel setzen
              const snappedRad = ang * Math.PI / 180;
              const dist = Math.hypot(userRay.end.x - pivotX, userRay.end.y - pivotY);
              userRay.end.x = pivotX + Math.sin(snappedRad) * dist;
              userRay.end.y = pivotY - Math.cos(snappedRad) * dist;
            } else {
              userRay.snapped = false;
            }
            currentAngle = ang;
          }

          function isNearProtractorCenter(p) {
            if (!showProtractor) return false;
            return Math.hypot(p.x - protPos.x, p.y - protPos.y) < 25;
          }
          function isNearProtractorHandle(p) {
            if (!showProtractor) return false;
            const handleDist = 110;
            const hx = protPos.x + Math.sin(protPos.rotation) * handleDist;
            const hy = protPos.y - Math.cos(protPos.rotation) * handleDist;
            return Math.hypot(p.x - hx, p.y - hy) < 15;
          }

          function startDraw(e) {
            if (window._reflectAnswered) return;
            e.preventDefault();
            const p = getCanvasPos(canvas, e);
            // Geodreieck-Interaktion hat Priorität
            if (isNearProtractorHandle(p)) {
              protractorDrag = { mode: 'rotate' };
              return;
            }
            if (isNearProtractorCenter(p)) {
              protractorDrag = { mode: 'move', offsetX: p.x - protPos.x, offsetY: p.y - protPos.y };
              return;
            }
            // Sonst Strahl zeichnen
            if (Math.hypot(p.x - pivotX, p.y - pivotY) > 40) return;
            drawing = true;
            userRay = { end: { x: p.x, y: p.y }, snapped: false };
            updateAngle();
            draw();
          }
          function moveDraw(e) {
            e.preventDefault();
            const p = getCanvasPos(canvas, e);
            if (protractorDrag) {
              if (protractorDrag.mode === 'move') {
                protPos.x = p.x - protractorDrag.offsetX;
                protPos.y = p.y - protractorDrag.offsetY;
              } else if (protractorDrag.mode === 'rotate') {
                protPos.rotation = Math.atan2(p.x - protPos.x, -(p.y - protPos.y));
              }
              draw();
              return;
            }
            if (!drawing) return;
            // Nur oberhalb des Spiegels
            if (p.y >= mirrorY - 3) {
              userRay.end = { x: p.x, y: mirrorY - 3 };
            } else {
              userRay.end = { x: p.x, y: p.y };
            }
            updateAngle();
            draw();
          }
          function endDraw(e) {
            if (protractorDrag) {
              protractorDrag = null;
              return;
            }
            drawing = false;
            if (userRay && Math.hypot(userRay.end.x - pivotX, userRay.end.y - pivotY) < 30) {
              userRay = null;
              currentAngle = null;
            }
            draw();
          }
          canvas.addEventListener('mousedown', startDraw);
          canvas.addEventListener('mousemove', moveDraw);
          canvas.addEventListener('mouseup', endDraw);
          canvas.addEventListener('mouseleave', endDraw);
          canvas.addEventListener('touchstart', startDraw, {passive:false});
          canvas.addEventListener('touchmove', moveDraw, {passive:false});
          canvas.addEventListener('touchend', endDraw);

          document.getElementById('protractorBtn').addEventListener('click', () => {
            showProtractor = !showProtractor;
            document.getElementById('protractorBtn').style.background = showProtractor ? 'rgba(255,215,0,0.2)' : '';
            document.getElementById('protractorBtn').style.borderColor = showProtractor ? '#ffd700' : '';
            if (showProtractor) {
              // Geodreieck auf Pivotpunkt setzen
              protPos = { x: pivotX, y: pivotY, rotation: 0 };
            }
            draw();
          });
          document.getElementById('reflectResetBtn').addEventListener('click', () => {
            userRay = null;
            currentAngle = null;
            window._reflectAnswered = false;
            document.getElementById('reflectCheckBtn').disabled = false;
            draw();
          });
          document.getElementById('reflectCheckBtn').addEventListener('click', () => {
            if (!userRay || currentAngle === null) {
              alert('Bitte zeichne zuerst den reflektierten Strahl.');
              return;
            }
            window._reflectAnswered = true;
            document.getElementById('reflectCheckBtn').disabled = true;
            const diff = Math.abs(currentAngle - targetAngle);
            const ok = diff < 3; // ±3° Toleranz (durch Snap meist exakt)
            // Korrekten Strahl immer einzeichnen
            const correctX = pivotX + Math.sin(rad) * rayLen;
            const correctY = pivotY - Math.cos(rad) * rayLen;
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 3;
            ctx.setLineDash([6,3]);
            ctx.beginPath();
            ctx.moveTo(pivotX, pivotY);
            ctx.lineTo(correctX, correctY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(correctX, correctY, 6, 0, Math.PI*2); ctx.fill();
            ctx.font = 'bold 13px sans-serif';
            ctx.fillText('β=' + targetAngle + '° (richtig)', correctX + 10, correctY + 5);
            showFeedback(ok,
              `Nach dem <strong>Reflexionsgesetz</strong> gilt: Einfallswinkel α = Ausfallswinkel β, beide <strong>vom Lot aus gemessen</strong>. In dieser Aufgabe war α = ${targetAngle}°, also muss auch β = ${targetAngle}° sein. Dein Winkel: ${currentAngle.toFixed(0)}° (Abweichung: ${diff.toFixed(1)}°).`
            );
          });
          draw();
        });
      }

    {
      typeLabel: 'Eingabe',
      difficulty: 'mittel',
      question: 'Was siehst du im Spiegel? Schreibe die Spiegelschrift richtig:',
      render() {

        const body = document.getElementById('taskBody');
        body.innerHTML = `
          <canvas id="mirrorImg" width="500" height="300"></canvas>
          <div class="hint-box"><strong>💡 Ziehe den gelben Punkt!</strong> Beobachte, wie weit das rote Spiegelbild hinter dem Spiegel erscheint.</div>

        function draw() {
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0,0,w,h);
          ctx.fillStyle = '#0a0e2a';
          ctx.fillRect(0,0,w,h);

          const mirrorX = w/2;
          // Spiegel
          ctx.strokeStyle = '#6b8aff';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(mirrorX, 30);
          ctx.lineTo(mirrorX, h-30);
          ctx.stroke();
          // Spiegelstreifen
          ctx.lineWidth = 1;
          for (let y = 35; y < h-30; y += 8) {
            ctx.beginPath();
            ctx.moveTo(mirrorX, y);
            ctx.lineTo(mirrorX+6, y+4);
            ctx.stroke();
          }

          // Abstands-Linie Original → Spiegel
          ctx.strokeStyle = 'rgba(255,215,0,0.4)';
          ctx.setLineDash([3,3]);
          ctx.beginPath();
          ctx.moveTo(obj.x, obj.y);
          ctx.lineTo(mirrorX, obj.y);
          ctx.stroke();
          // Abstands-Linie Spiegel → Spiegelbild
          const imgX = 2*mirrorX - obj.x;
          ctx.strokeStyle = 'rgba(255,107,107,0.4)';
          ctx.beginPath();
          ctx.moveTo(mirrorX, obj.y);
          ctx.lineTo(imgX, obj.y);
          ctx.stroke();
          ctx.setLineDash([]);

          // Abstand anzeigen
          const dist = Math.abs(mirrorX - obj.x);
          ctx.fillStyle = '#ffd700';
          ctx.font = '12px sans-serif';
          ctx.fillText(`${Math.round(dist/2)} cm`, (obj.x + mirrorX)/2 - 15, obj.y - 8);
          ctx.fillStyle = '#ff6b6b';
          ctx.fillText(`${Math.round(dist/2)} cm`, (mirrorX + imgX)/2 - 15, obj.y - 8);

          // Original-Objekt (gelb)
          ctx.fillStyle = '#ffd700';
          ctx.beginPath();
          ctx.arc(obj.x, obj.y, 14, 0, Math.PI*2);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = '#1a1a2e';
          ctx.font = 'bold 16px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('K', obj.x, obj.y+5);

          // Spiegelbild (rot, seitenverkehrt)
          ctx.fillStyle = '#ff6b6b';
          ctx.beginPath();
          ctx.arc(imgX, obj.y, 14, 0, Math.PI*2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.setLineDash([2,2]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = '#fff';
          ctx.save();
          ctx.translate(imgX, obj.y);
          ctx.scale(-1,1); // Spiegelung des K
          ctx.fillText('K', 0, 5);
          ctx.restore();
          ctx.textAlign = 'start';

          ctx.fillStyle = '#fff';
          ctx.font = '12px sans-serif';
          ctx.fillText('Gegenstand', obj.x - 30, obj.y + 28);
          ctx.fillText('Spiegelbild', imgX - 25, obj.y + 28);
          ctx.fillText('Spiegel', mirrorX - 20, 20);
        }
        function getPos(e) {
          const rect = canvas.getBoundingClientRect();
          const t = e.touches ? e.touches[0] : e;
          return { x: (t.clientX - rect.left) * canvas.width/rect.width, y: (t.clientY - rect.top) * canvas.height/rect.height };
        }
        function down(e) {
          e.preventDefault();
          const p = getPos(e);
          if (Math.hypot(p.x-obj.x, p.y-obj.y) < 25 && p.x < canvas.width/2 - 10) {
            dragging = true;
          }
        }
        function move(e) {
          if (!dragging) return;
          e.preventDefault();
          const p = getPos(e);
          obj.x = Math.max(30, Math.min(canvas.width/2 - 20, p.x));
          obj.y = Math.max(40, Math.min(canvas.height-40, p.y));
          draw();
        }
        function up() { dragging = false; }
        canvas.addEventListener('mousedown', down);
        canvas.addEventListener('mousemove', move);
        canvas.addEventListener('mouseup', up);
        canvas.addEventListener('touchstart', down, {passive:false});
        canvas.addEventListener('touchmove', move, {passive:false});
        canvas.addEventListener('touchend', up);
        draw();

        document.getElementById('taskActions').innerHTML = `
          <button class="btn btn-primary" onclick="afterMirrorSim()">Ich habe es beobachtet →</button>

          );
          document.getElementById('taskActions').innerHTML = '';
        };
      }

      typeLabel: 'Lückentext',
      difficulty: 'mittel',
      question: 'Ergänze das Reflexionsgesetz:',

        `;
        const canvas = document.getElementById('refractCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('refractAngle');
        const label = document.getElementById('refAngleLabel');

        function draw() {
          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0,0,w,h);
          // Luft
          ctx.fillStyle = '#1a2151';
          ctx.fillRect(0,0,w,h/2);
          // Wasser
          const wGrad = ctx.createLinearGradient(0, h/2, 0, h);
          wGrad.addColorStop(0, '#2a5080');
          wGrad.addColorStop(1, '#1a3050');
          ctx.fillStyle = wGrad;
          ctx.fillRect(0, h/2, w, h/2);

          const pivot = { x: w/2, y: h/2 };
          const angle = parseInt(slider.value);
          const radIn = angle * Math.PI/180;

          // Lot
          ctx.strokeStyle = 'rgba(255,255,255,0.4)';
          ctx.setLineDash([5,5]);
          ctx.beginPath();
          ctx.moveTo(pivot.x, 20);

          ctx.strokeStyle = 'rgba(255,255,255,0.5)';

          ctx.beginPath();
          ctx.moveTo(0, h/2);

          ctx.stroke();

          // Einfallender Strahl
          const rayLen = 120;
          const startX = pivot.x - Math.sin(radIn) * rayLen;
          const startY = pivot.y - Math.cos(radIn) * rayLen;
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          ctx.lineTo(pivot.x, pivot.y);
          ctx.stroke();

          // Gebrochener Strahl (Snelliussches Gesetz n1 sin α = n2 sin β; n_luft ≈ 1, n_wasser ≈ 1.33)
          const n1 = 1.0, n2 = 1.33;
          let sinBeta = n1 / n2 * Math.sin(radIn);
          let radOut = Math.asin(Math.min(1, sinBeta));
          const endX = pivot.x + Math.sin(radOut) * rayLen;
          const endY = pivot.y + Math.cos(radOut) * rayLen;

          ctx.stroke();

          // Beschriftungen
          ctx.fillStyle = '#fff';
          ctx.font = '13px sans-serif';
          ctx.fillText('Luft', 20, 30);
          ctx.fillText('Wasser', 20, h/2 + 22);

          ctx.fillStyle = '#fff';
          ctx.font = '11px sans-serif';
          ctx.fillText(`α = ${angle}°`, 20, h - 40);
          ctx.fillText(`β ≈ ${Math.round(radOut * 180/Math.PI)}°`, 20, h - 25);
          label.textContent = angle + '°';
        }
        slider.oninput = draw;
        draw();

            b.style.color = '#ffd700';

          const w = canvas.width, h = canvas.height;
          ctx.clearRect(0,0,w,h);
          ctx.fillStyle = '#0a0e2a';

          const centerX = w/2, centerY = h/2;
          const f = 120; // Brennweite in Pixel

            ctx.fill();
            ctx.stroke();
            // Pfeile oben/unten

            ctx.lineTo(centerX+8, centerY+90);

              ctx.beginPath();
              ctx.arc(objX, objTopY, 14, 0, Math.PI*2);
              ctx.stroke();
              ctx.setLineDash([]);
            }
            document.getElementById('lens2Count').textContent = `${drawnRays.length} / 2`;
            const stepEl = document.getElementById('lens2Step');
            if (step === 0) {
              stepEl.innerHTML = '<strong>Schritt 1 von 2:</strong> Zeichne den <strong>Parallelstrahl</strong>. Ziehe von G waagerecht bis zur Linse.';
            } else if (step === 1) {
              stepEl.innerHTML = '<strong>Schritt 2 von 2:</strong> Zeichne den <strong>Mittelpunktsstrahl</strong> von G durch den Linsenmittelpunkt.';
            } else {
              stepEl.innerHTML = '<strong>Fertig!</strong> Achtung: Die Strahlen nach der Linse (durchgezogen) laufen auseinander – die gestrichelten Linien sind die <em>Rückwärtsverlängerungen</em>. Dort schneiden sie sich scheinbar!';
            }
          }

          function startDraw(e) {
            if (step >= 2 || window._lens2Answered) return;
            e.preventDefault();
            const p = getCanvasPos(canvas, e);
            if (Math.hypot(p.x - objX, p.y - objTopY) > 30) return;
            drawing = true;
            currentDrawing = { start: { x: objX, y: objTopY }, end: { x: p.x, y: p.y } };
            draw();
          }
          function moveDraw(e) {
            if (!drawing) return;
            e.preventDefault();
            const p = getCanvasPos(canvas, e);
            let endX = p.x, endY = p.y;
            if (step === 0) {
              endY = objTopY;
              if (endX > centerX) endX = centerX;
              if (endX < objX + 10) endX = objX + 10;
            } else if (step === 1) {
              const dx = p.x - objX, dy = p.y - objTopY;
              const tToLens = (centerX - objX) / dx;
              if (dx > 0 && tToLens > 0) {
                const maxX = Math.min(p.x, centerX);
                endX = maxX;
                endY = objTopY + (maxX - objX) / dx * dy;
              }
              if (Math.hypot(p.x - centerX, p.y - centerY) < 20) {
                endX = centerX; endY = centerY;
              }
            }
            currentDrawing.end = { x: endX, y: endY };
            draw();
          }
          function endDraw(e) {
            if (!drawing || !currentDrawing) return;
            drawing = false;
            const end = currentDrawing.end;
            if (step === 0) {
              if (end.x >= centerX - 15) {
                drawnRays.push({ type: 'parallel', endAtLens: { x: centerX, y: objTopY } });
                step = 1;
              }
            } else if (step === 1) {
              if (Math.hypot(end.x - centerX, end.y - centerY) < 25) {
                drawnRays.push({ type: 'mid', endAtLens: { x: centerX, y: centerY } });
                step = 2;
                const btn = document.getElementById('lens2CheckBtn');
                btn.disabled = false; btn.style.opacity = '1';
              }
            }
            currentDrawing = null;
            draw();
          }
          canvas.addEventListener('mousedown', startDraw);
          canvas.addEventListener('mousemove', moveDraw);
          canvas.addEventListener('mouseup', endDraw);
          canvas.addEventListener('touchstart', startDraw, {passive:false});
          canvas.addEventListener('touchmove', moveDraw, {passive:false});
          canvas.addEventListener('touchend', endDraw);
          document.getElementById('lens2ResetBtn').addEventListener('click', () => {
            drawnRays = []; step = 0; currentDrawing = null;
            window._lens2Answered = false;
            const btn = document.getElementById('lens2CheckBtn');
            btn.disabled = true; btn.style.opacity = '0.5';
            draw();
          });
          document.getElementById('lens2CheckBtn').addEventListener('click', () => {
            if (step < 2) return;
            window._lens2Answered = true;
            document.getElementById('lens2CheckBtn').disabled = true;
            // Virtuelles Bild zeichnen
            ctx.strokeStyle = '#ffd700';
            ctx.fillStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.setLineDash([6,3]);
            ctx.beginPath();
            ctx.moveTo(imgX, centerY); ctx.lineTo(imgX, imgTopY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(imgX, imgTopY);
            ctx.lineTo(imgX-6, imgTopY+9);
            ctx.lineTo(imgX+6, imgTopY+9);
            ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.arc(imgX, imgTopY, 5, 0, Math.PI*2); ctx.fill();
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText("B'", imgX-10, imgTopY+5);
            ctx.strokeStyle = 'rgba(255,215,0,0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([3,3]);
            ctx.beginPath();
            ctx.arc(imgX, imgTopY, 14, 0, Math.PI*2);
            ctx.stroke();
            ctx.setLineDash([]);
            showFeedback(true, 'Super! Du siehst: Nach der Linse laufen die Strahlen <strong>auseinander</strong> – sie treffen sich nicht mehr! Aber wenn du sie <strong>rückwärts verlängerst</strong> (gestrichelte Linien), schneiden sie sich scheinbar <em>auf derselben Seite</em> wie der Gegenstand. Dort entsteht ein <strong>virtuelles, aufrechtes und vergrößertes Bild</strong> – genau das ist das Prinzip der <strong>Lupe</strong>!');
          });

// DRAG & DROP (Touch-fähig)
