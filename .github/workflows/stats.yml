name: Update GoatCounter Stats

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GoatCounter stats
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GC_SITE: learnlab
        run: |
          set -e
          END=$(date -u +%Y-%m-%d)
          START=$(date -u -d "30 days ago" +%Y-%m-%d)
          URL="https://${GC_SITE}.goatcounter.com/api/v0/stats/hits?start=${START}&end=${END}&limit=200"
          echo "Fetching: $URL"
          
          curl -sS --fail-with-body \
            -A "GitHub-Action-LearnLab-Stats" \
            -H "Authorization: Bearer $GC_TOKEN" \
            -H "Accept: application/json" \
            --retry 3 --retry-delay 5 \
            "$URL" \
            -o stats-raw.json
          
          echo "Response size: $(wc -c < stats-raw.json) bytes"
          head -c 500 stats-raw.json
          echo ""
          
          node <<'EOF'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('stats-raw.json', 'utf8'));
          const out = { updated: new Date().toISOString(), paths: {}, total: 0 };
          for (const h of (raw.hits || [])) {
            const total = (h.stats || []).reduce((s,d) => s + (d.daily || 0), 0);
            out.paths[h.path] = total;
            out.total += total;
          }
          fs.writeFileSync('stats.json', JSON.stringify(out, null, 2));
          console.log('Wrote stats.json with', Object.keys(out.paths).length, 'paths,', out.total, 'total hits');
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --cached --quiet || git commit -m "Update stats.json [skip ci]"
          git push
