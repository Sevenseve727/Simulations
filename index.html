<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LearnLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
// ─── TEACHER COMPONENTS ───────────────────────────────────────────────────────
const DEMO_TEACHER = { name: 'Frau Müller', email: 'mueller@learnlab.de', password: '1234' };

const TEACHER_STATS = [
  { label: 'Lernumgebungen', value: 21, icon: '📚' },
  { label: 'Fächer', value: 4, icon: '🔬' },
  { label: 'Klassenstufen', value: 5, icon: '🎓' },
  { label: 'Aktiv diese Woche', value: 138, icon: '👥' },
];

const TEACHER_ACTIVITY = [
  { subject:'bio',  grade:6, title:'Das menschliche Skelett', count:32, last:'Heute' },
  { subject:'chem', grade:7, title:'Säuren & Basen',          count:28, last:'Gestern' },
  { subject:'bio',  grade:7, title:'Genetik: DNA & Gene',     count:24, last:'Mo, 28. Apr' },
  { subject:'chem', grade:8, title:'Das Periodensystem',      count:20, last:'Fr, 25. Apr' },
  { subject:'bio',  grade:6, title:'Ökosystem Wald',          count:17, last:'Do, 24. Apr' },
];

const SUB_META = {
  bio:  { color:'oklch(62% 0.17 145)', bg:'oklch(95% 0.06 145)', icon:'🌿', label:'Biologie' },
  chem: { color:'oklch(60% 0.17 290)', bg:'oklch(95% 0.06 290)', icon:'⚗️', label:'Chemie'   },
  phys: { color:'oklch(60% 0.17 230)', bg:'oklch(95% 0.06 230)', icon:'🔭', label:'Physik'   },
  math: { color:'oklch(68% 0.18 55)',  bg:'oklch(96% 0.07 55)',  icon:'📐', label:'Mathematik'},
};

function LoginModal({ onLogin, onClose, roundness }) {
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const submit = e => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => {
      if (email === DEMO_TEACHER.email && pw === DEMO_TEACHER.password) {
        onLogin(DEMO_TEACHER);
      } else {
        setError('E-Mail oder Passwort falsch.');
        setLoading(false);
      }
    }, 600);
  };

  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:900,
      background:'oklch(0% 0 0 / 0.4)', backdropFilter:'blur(6px)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:24,
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'#fff', borderRadius:roundness+4, width:'100%', maxWidth:420,
        boxShadow:'0 24px 64px oklch(0% 0 0 / 0.18)', overflow:'hidden',
        animation:'loginIn 0.22s ease-out',
      }}>
        <style>{`@keyframes loginIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:none}}`}</style>
        <div style={{ height:6, background:'linear-gradient(90deg,oklch(62% 0.17 145),oklch(60% 0.17 230))' }}/>
        <div style={{ padding:'28px 32px 32px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
            <div>
              <div style={{ fontSize:20, fontWeight:800, marginBottom:2 }}>Lehrer-Login</div>
              <div style={{ fontSize:13, color:'oklch(55% 0.01 260)' }}>LearnLab · Lehrerzugang</div>
            </div>
            <button onClick={onClose} style={{ width:32, height:32, borderRadius:'50%', border:'none', background:'oklch(95% 0.005 260)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'oklch(55% 0.01 260)', fontSize:16 }}>✕</button>
          </div>
          <form onSubmit={submit} style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <label style={{ fontSize:12, fontWeight:700, color:'oklch(40% 0.01 260)', display:'block', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.06em' }}>E-Mail</label>
              <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@schule.de"
                style={{ width:'100%', padding:'11px 14px', borderRadius:roundness, border:'1.5px solid oklch(91% 0.005 260)', fontFamily:'inherit', fontSize:14, outline:'none' }}
                onFocus={e=>e.target.style.borderColor='oklch(60% 0.17 230)'}
                onBlur={e=>e.target.style.borderColor='oklch(91% 0.005 260)'}
              />
            </div>
            <div>
              <label style={{ fontSize:12, fontWeight:700, color:'oklch(40% 0.01 260)', display:'block', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.06em' }}>Passwort</label>
              <input type="password" required value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"
                style={{ width:'100%', padding:'11px 14px', borderRadius:roundness, border:'1.5px solid oklch(91% 0.005 260)', fontFamily:'inherit', fontSize:14, outline:'none' }}
                onFocus={e=>e.target.style.borderColor='oklch(60% 0.17 230)'}
                onBlur={e=>e.target.style.borderColor='oklch(91% 0.005 260)'}
              />
            </div>
            {error && (
              <div style={{ padding:'10px 14px', borderRadius:roundness, background:'oklch(96% 0.04 25)', color:'oklch(45% 0.18 25)', fontSize:13 }}>{error}</div>
            )}
            <div style={{ padding:'10px 14px', borderRadius:roundness, background:'oklch(96% 0.06 230)', color:'oklch(40% 0.14 230)', fontSize:12.5, lineHeight:1.5 }}>
              <strong>Demo:</strong> mueller@learnlab.de · Passwort: 1234
            </div>
            <button type="submit" disabled={loading} style={{
              padding:'13px', borderRadius:roundness, border:'none', cursor:'pointer',
              background:'linear-gradient(135deg,oklch(62% 0.17 145),oklch(60% 0.17 230))',
              color:'#fff', fontFamily:'inherit', fontSize:15, fontWeight:700,
              opacity: loading ? 0.7 : 1, boxShadow:'0 4px 16px oklch(60% 0.17 230 / 0.35)',
            }}>{loading ? 'Anmelden …' : 'Anmelden'}</button>
          </form>
        </div>
      </div>
    </div>
  );
}

function TeacherDashboard({ user, onLogout, cards, roundness, onShowAll }) {
  return (
    <div style={{ maxWidth:1100, margin:'0 auto', padding:'32px 40px 80px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:32 }}>
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:'oklch(55% 0.01 260)', marginBottom:4, textTransform:'uppercase', letterSpacing:'0.07em' }}>Lehrer-Dashboard</div>
          <h2 style={{ fontSize:28, fontWeight:900, letterSpacing:'-0.4px' }}>Willkommen, {user.name} 👋</h2>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <button onClick={onShowAll} style={{ padding:'9px 18px', borderRadius:100, border:'1.5px solid oklch(91% 0.005 260)', background:'#fff', cursor:'pointer', fontFamily:'inherit', fontSize:13, fontWeight:600, color:'oklch(40% 0.01 260)' }}>Zur Übersicht</button>
          <button onClick={onLogout} style={{ padding:'9px 18px', borderRadius:100, border:'none', background:'oklch(97% 0.005 260)', cursor:'pointer', fontFamily:'inherit', fontSize:13, fontWeight:600, color:'oklch(45% 0.01 260)', display:'flex', alignItems:'center', gap:6 }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Abmelden
          </button>
        </div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16, marginBottom:32 }}>
        {TEACHER_STATS.map(s => (
          <div key={s.label} style={{ background:'#fff', borderRadius:roundness, border:'1.5px solid oklch(91% 0.005 260)', padding:'20px 22px' }}>
            <div style={{ fontSize:28, marginBottom:8 }}>{s.icon}</div>
            <div style={{ fontSize:26, fontWeight:900, letterSpacing:'-0.5px', marginBottom:2 }}>{s.value}</div>
            <div style={{ fontSize:13, color:'oklch(55% 0.01 260)', fontWeight:500 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <div style={{ background:'#fff', borderRadius:roundness, border:'1.5px solid oklch(91% 0.005 260)', padding:'22px 24px' }}>
          <div style={{ fontSize:15, fontWeight:800, marginBottom:18 }}>Zuletzt genutzt</div>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            {TEACHER_ACTIVITY.map((a,i) => {
              const s = SUB_META[a.subject];
              return (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <div style={{ width:36, height:36, borderRadius:10, background:s.bg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0 }}>{s.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13.5, fontWeight:700, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{a.title}</div>
                    <div style={{ fontSize:12, color:'oklch(55% 0.01 260)' }}>Kl. {a.grade} · {a.last}</div>
                  </div>
                  <div style={{ fontSize:12.5, fontWeight:700, color:s.color, flexShrink:0 }}>{a.count}×</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ background:'#fff', borderRadius:roundness, border:'1.5px solid oklch(91% 0.005 260)', padding:'22px 24px' }}>
          <div style={{ fontSize:15, fontWeight:800, marginBottom:18 }}>Meine Fächer</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {['bio','chem'].map(subId => {
              const s = SUB_META[subId];
              const count = cards.filter(c=>c.subject===subId).length;
              return (
                <div key={subId} style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px', borderRadius:roundness, background:s.bg, cursor:'pointer' }}>
                  <span style={{ fontSize:22 }}>{s.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:800, color:s.color }}>{s.label}</div>
                    <div style={{ fontSize:12, color:'oklch(45% 0.01 260)' }}>{count} Lernumgebungen</div>
                  </div>
                  <div style={{ fontSize:20, color:s.color, opacity:0.6 }}>›</div>
                </div>
              );
            })}
            <div style={{ marginTop:8, padding:'14px 16px', borderRadius:roundness, background:'oklch(97% 0.005 260)', fontSize:13, color:'oklch(50% 0.01 260)', lineHeight:1.5 }}>
              <strong>Tipp:</strong> Lernumgebungen können per Link direkt in den Unterricht eingebunden werden.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; background: oklch(98% 0.006 60); color: oklch(18% 0.01 260); }
  :root {
    --bio:  oklch(62% 0.17 145);
    --bio-light: oklch(95% 0.06 145);
    --chem: oklch(60% 0.17 290);
    --chem-light: oklch(95% 0.06 290);
    --phys: oklch(60% 0.17 230);
    --phys-light: oklch(95% 0.06 230);
    --math: oklch(68% 0.18 55);
    --math-light: oklch(96% 0.07 55);
    --bg: oklch(98% 0.006 60);
    --surface: oklch(100% 0 0);
    --border: oklch(91% 0.005 260);
    --muted: oklch(55% 0.01 260);
  }
  body { overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script type="application/json" id="__tweak_defaults">
{
  "roundness": 16,
  "density": "comfortable",
  "heroStyle": "gradient",
  "showDifficulty": true
}
</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── DATA ─────────────────────────────────────────────────────────────────────
const SUBJECTS = [
  { id: 'alle',  label: 'Alle Fächer',  color: null },
  { id: 'bio',   label: 'Biologie',     color: 'var(--bio)',  bg: 'var(--bio-light)',  icon: '🌿' },
  { id: 'chem',  label: 'Chemie',       color: 'var(--chem)', bg: 'var(--chem-light)', icon: '⚗️' },
  { id: 'phys',  label: 'Physik',       color: 'var(--phys)', bg: 'var(--phys-light)', icon: '🔭' },
  { id: 'math',  label: 'Mathematik',   color: 'var(--math)', bg: 'var(--math-light)', icon: '📐' },
];

const CARDS = [
  // Biologie (Platzhalter – noch keine Dateien vorhanden)
  { id:1, subject:'bio', grade:5, title:'Die Zelle – Bausteine des Lebens', desc:'Erkunde den Aufbau tierischer und pflanzlicher Zellen interaktiv.', duration:'25 min', difficulty:'Leicht', topics:['Zellkern','Mitochondrien','Zellwand'], url:null },
  { id:2, subject:'bio', grade:6, title:'Das menschliche Skelett', desc:'Lerne alle 206 Knochen und ihre Funktionen kennen.', duration:'35 min', difficulty:'Mittel', topics:['Knochen','Gelenke','Muskulatur'], url:null },
  { id:3, subject:'bio', grade:7, title:'Genetik: DNA & Gene', desc:'Wie wird Erbinformation weitergegeben? Simuliere Kreuzungsexperimente.', duration:'45 min', difficulty:'Mittel', topics:['DNA','Chromosomen','Mendel'], url:null },
  // Chemie – echte Lernumgebungen
  { id:7, subject:'chem', grade:5, title:'Brownsche Bewegung', desc:'Beobachte die zufällige Wärmebewegung von Teilchen in einer Flüssigkeit.', duration:'20 min', difficulty:'Leicht', topics:['Teilchenmodell','Diffusion','Wärmebewegung'], url:'https://sevenseve727.github.io/Simulations/brownsche-bewegung.html' },
  { id:8, subject:'chem', grade:6, title:'Papierchromatographie', desc:'Trenne Farbstoffe durch Chromatographie – virtuelles Experiment mit echten Messwerten.', duration:'25 min', difficulty:'Leicht', topics:['Trennung','Löslichkeit','Farbstoffe'], url:'https://sevenseve727.github.io/Simulations/chromatographie_simulation.html' },
  { id:9, subject:'chem', grade:6, title:'Destillation', desc:'Wie funktioniert Destillation? Interaktive Simulation von Siedepunkten und Trennung.', duration:'30 min', difficulty:'Leicht', topics:['Siedepunkt','Trennung','Gemische'], url:'https://sevenseve727.github.io/Simulations/destillation_lernumgebung.html' },
  { id:10, subject:'chem', grade:10, title:'Van-der-Waals-Simulation', desc:'Erforsche intermolekulare Kräfte und ihr Verhalten bei verschiedenen Drücken und Temperaturen.', duration:'40 min', difficulty:'Fortgeschritten', topics:['Intermolekulare Kräfte','Gase','Aggregatzustände'], url:'https://sevenseve727.github.io/Simulations/vdw-simulation.html' },
  { id:11, subject:'chem', grade:10, title:'Benennung der Alkane (IUPAC)', desc:'Lerne die systematische Nomenklatur organischer Verbindungen Schritt für Schritt.', duration:'35 min', difficulty:'Fortgeschritten', topics:['Alkane','IUPAC','Organische Chemie'], url:'https://sevenseve727.github.io/Simulations/AlkanLernumgebung.html' },
  { id:12, subject:'chem', grade:10, title:'Fraktionierte Destillation von Erdöl', desc:'Wie wird Erdöl in seine Bestandteile aufgetrennt? Interaktive Fraktionsdarstellung.', duration:'40 min', difficulty:'Fortgeschritten', topics:['Erdöl','Fraktionen','Destillation'], url:'https://sevenseve727.github.io/Simulations/fraktionierte_destillation.html' },
  // Physik – echte Lernumgebungen
  { id:13, subject:'phys', grade:6, title:'Totalreflexion', desc:'Untersuche das Phänomen der Totalreflexion und seine Anwendungen in der Glasfasertechnik.', duration:'25 min', difficulty:'Mittel', topics:['Licht','Reflexion','Glasfaser'], url:'https://sevenseve727.github.io/Simulations/totalreflexion.html' },
  { id:14, subject:'phys', grade:6, title:'Übungen Klassenarbeit Physik', desc:'Interaktive Übungsaufgaben zur Vorbereitung auf die Klassenarbeit – Optik & Licht.', duration:'30 min', difficulty:'Mittel', topics:['Optik','Licht','Reflexion'], url:'https://sevenseve727.github.io/Simulations/optik_lernapp.html' },
  // Mathematik (Platzhalter)
  { id:17, subject:'math', grade:5, title:'Brüche und Dezimalzahlen', desc:'Brüche addieren, subtrahieren und vergleichen – visuell.', duration:'25 min', difficulty:'Leicht', topics:['Brüche','Dezimalzahlen','Umrechnen'], url:null },
  { id:18, subject:'math', grade:6, title:'Geometrie: Flächen', desc:'Flächeninhalt und Umfang verschiedener Formen berechnen.', duration:'30 min', difficulty:'Leicht', topics:['Rechteck','Dreieck','Kreis'], url:null },
  { id:19, subject:'math', grade:7, title:'Lineare Gleichungen', desc:'Gleichungen lösen Schritt für Schritt – mit sofortigem Feedback.', duration:'35 min', difficulty:'Mittel', topics:['Gleichungen','Variable','Äquivalenzumformung'], url:null },
];

const SUBJECT_MAP = Object.fromEntries(SUBJECTS.filter(s=>s.id!=='alle').map(s=>[s.id,s]));

const DIFF_COLOR = {
  'Leicht': 'oklch(62% 0.17 145)',
  'Mittel': 'oklch(68% 0.18 55)',
  'Fortgeschritten': 'oklch(60% 0.17 290)',
};

// ─── ICONS ────────────────────────────────────────────────────────────────────
function SearchIcon() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
}
function CloseIcon() {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
}
function PlayIcon() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
}
function ClockIcon() {
  return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
}


// ─── SUBJECT PILL ─────────────────────────────────────────────────────────────
function SubjectPill({ subject, active, onClick }) {
  const s = SUBJECTS.find(x => x.id === subject);
  return (
    <button
      onClick={onClick}
      style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '9px 18px', borderRadius: 100, border: 'none', cursor: 'pointer',
        fontFamily: 'inherit', fontSize: 14, fontWeight: 600,
        transition: 'all 0.2s',
        background: active ? (s.color || 'oklch(18% 0.01 260)') : 'var(--surface)',
        color: active ? '#fff' : 'var(--muted)',
        boxShadow: active ? `0 2px 12px ${s.color || '#000'}44` : '0 0 0 1.5px var(--border)',
        transform: active ? 'translateY(-1px)' : 'none',
      }}
    >
      {s.icon && <span style={{fontSize:16}}>{s.icon}</span>}
      {s.label}
    </button>
  );
}

// ─── GRADE PILL ───────────────────────────────────────────────────────────────
function GradePill({ grade, active, onClick, subjectColor }) {
  return (
    <button
      onClick={onClick}
      style={{
        padding: '6px 14px', borderRadius: 100, border: 'none', cursor: 'pointer',
        fontFamily: 'inherit', fontSize: 13, fontWeight: 600,
        transition: 'all 0.18s',
        background: active ? subjectColor || 'oklch(18% 0.01 260)' : 'transparent',
        color: active ? '#fff' : 'var(--muted)',
        boxShadow: active ? 'none' : 'inset 0 0 0 1.5px var(--border)',
      }}
    >
      Klasse {grade}
    </button>
  );
}

// ─── CARD ─────────────────────────────────────────────────────────────────────
function LernCard({ card, roundness, showDifficulty, onClick }) {
  const [hovered, setHovered] = useState(false);
  const s = SUBJECT_MAP[card.subject];

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: 'var(--surface)',
        borderRadius: roundness,
        border: '1.5px solid var(--border)',
        overflow: 'hidden',
        cursor: 'pointer',
        transition: 'all 0.22s',
        transform: hovered ? 'translateY(-4px)' : 'none',
        boxShadow: hovered ? `0 12px 32px ${s.color}22` : '0 1px 4px oklch(0% 0 0 / 0.06)',
      }}
    >
      {/* Color bar */}
      <div style={{
        height: 6, background: s.color,
      }}/>
      {/* Body */}
      <div style={{ padding: '20px 22px 22px' }}>
        {/* Header row */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <div style={{
            display:'flex', alignItems:'center', gap:6,
            padding:'4px 10px', borderRadius:100,
            background: s.bg, color: s.color,
            fontSize:12, fontWeight:700,
          }}>
            <span>{s.icon}</span> {s.label}
          </div>
          <div style={{
            padding:'4px 10px', borderRadius:100,
            background:'oklch(96% 0.005 260)',
            color:'var(--muted)', fontSize:12, fontWeight:600,
          }}>
            Kl. {card.grade}
          </div>
          {card.url && (
            <div style={{
              padding:'4px 10px', borderRadius:100,
              background:'oklch(94% 0.1 145)', color:'oklch(40% 0.17 145)',
              fontSize:11, fontWeight:700, display:'flex', alignItems:'center', gap:4,
            }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:'oklch(55% 0.17 145)', display:'inline-block' }}></span>
              Live
            </div>
          )}
        </div>
        {/* Title */}
        <h3 style={{ fontSize:16, fontWeight:800, lineHeight:1.3, marginBottom:8, color:'oklch(15% 0.01 260)' }}>
          {card.title}
        </h3>
        <p style={{ fontSize:13.5, color:'var(--muted)', lineHeight:1.55, marginBottom:16 }}>
          {card.desc}
        </p>
        {/* Topics */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:16 }}>
          {card.topics.map(t => (
            <span key={t} style={{
              fontSize:11.5, fontWeight:600,
              padding:'3px 9px', borderRadius:100,
              background: s.bg, color: s.color,
            }}>{t}</span>
          ))}
        </div>
        {/* Footer */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:5, color:'var(--muted)', fontSize:12.5 }}>
            <ClockIcon/> {card.duration}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {showDifficulty && (
              <span style={{
                fontSize:11.5, fontWeight:700,
                color: DIFF_COLOR[card.difficulty],
              }}>{card.difficulty}</span>
            )}
            <div style={{
              width:32, height:32, borderRadius:'50%',
              background: s.color,
              display:'flex', alignItems:'center', justifyContent:'center',
              color:'#fff',
              opacity: hovered ? 1 : 0.7,
              transition:'opacity 0.2s',
            }}>
              <PlayIcon/>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function Modal({ card, onClose, roundness }) {
  const s = SUBJECT_MAP[card.subject];
  useEffect(() => {
    const handler = e => { if(e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  return (
    <div
      onClick={onClose}
      style={{
        position:'fixed', inset:0, background:'oklch(0% 0 0 / 0.45)',
        display:'flex', alignItems:'center', justifyContent:'center',
        zIndex:1000, backdropFilter:'blur(4px)', padding:24,
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{
          background:'var(--surface)', borderRadius:roundness+4,
          width:'100%', maxWidth:520, overflow:'hidden',
          boxShadow:'0 24px 64px oklch(0% 0 0 / 0.2)',
          animation:'modalIn 0.22s ease-out',
        }}
      >
        <style>{`@keyframes modalIn { from { opacity:0; transform:scale(0.96) translateY(8px); } to { opacity:1; transform:none; } }`}</style>
        <div style={{ height:8, background:s.color }}/>
        <div style={{ padding:'28px 32px 32px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:20 }}>
            <div style={{
              display:'flex', alignItems:'center', gap:8,
              padding:'5px 12px', borderRadius:100,
              background:s.bg, color:s.color, fontSize:13, fontWeight:700,
            }}>
              {s.icon} {s.label} · Klasse {card.grade}
            </div>
            <button onClick={onClose} style={{ background:'var(--border)', border:'none', borderRadius:'50%', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'var(--muted)' }}>
              <CloseIcon/>
            </button>
          </div>
          <h2 style={{ fontSize:22, fontWeight:800, lineHeight:1.25, marginBottom:10 }}>{card.title}</h2>
          <p style={{ fontSize:15, color:'var(--muted)', lineHeight:1.6, marginBottom:20 }}>{card.desc}</p>
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:24 }}>
            {card.topics.map(t => (
              <span key={t} style={{ padding:'6px 14px', borderRadius:100, background:s.bg, color:s.color, fontSize:13, fontWeight:600 }}>{t}</span>
            ))}
          </div>
          <div style={{ display:'flex', gap:16, marginBottom:24, padding:'16px 20px', borderRadius:roundness, background:'oklch(98% 0.005 260)' }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, marginBottom:2 }}>DAUER</div>
              <div style={{ fontSize:15, fontWeight:700 }}>{card.duration}</div>
            </div>
            <div style={{ width:1, background:'var(--border)' }}/>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, marginBottom:2 }}>NIVEAU</div>
              <div style={{ fontSize:15, fontWeight:700, color:DIFF_COLOR[card.difficulty] }}>{card.difficulty}</div>
            </div>
            <div style={{ width:1, background:'var(--border)' }}/>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:11, color:'var(--muted)', fontWeight:600, marginBottom:2 }}>KLASSE</div>
              <div style={{ fontSize:15, fontWeight:700 }}>{card.grade}</div>
            </div>
          </div>
          {/* Embed placeholder or real link */}
          <div style={{
            borderRadius:roundness, background:`linear-gradient(135deg, ${s.bg}, oklch(98% 0 0))`,
            border:`1.5px dashed ${s.color}55`, padding:'28px 24px', textAlign:'center', marginBottom:20,
            color:'var(--muted)', fontSize:13, lineHeight:1.6,
          }}>
            <div style={{ fontSize:32, marginBottom:8 }}>{s.icon}</div>
            {card.url ? (
              <>
                <div style={{ fontWeight:600, color:'oklch(30% 0.01 260)', marginBottom:4 }}>Lernumgebung bereit</div>
                <div style={{ fontSize:12, color:'var(--muted)', wordBreak:'break-all' }}>{card.url}</div>
              </>
            ) : (
              <>
                <div style={{ fontWeight:600, color:'oklch(30% 0.01 260)' }}>Lernumgebung in Vorbereitung</div>
                <div>Diese Umgebung wird bald verfügbar sein.</div>
              </>
            )}
          </div>
          {card.url ? (
            <a href={card.url} target="_blank" rel="noopener noreferrer" style={{
              display:'flex', alignItems:'center', justifyContent:'center', gap:8,
              width:'100%', padding:'14px', borderRadius:roundness, border:'none',
              background:s.color, color:'#fff', fontFamily:'inherit',
              fontSize:15, fontWeight:700, cursor:'pointer', textDecoration:'none',
              boxShadow:`0 4px 16px ${s.color}44`,
            }}>
              <PlayIcon/> Jetzt starten
            </a>
          ) : (
            <button disabled style={{
              width:'100%', padding:'14px', borderRadius:roundness, border:'none',
              background:'oklch(91% 0.005 260)', color:'var(--muted)', fontFamily:'inherit',
              fontSize:15, fontWeight:700, cursor:'not-allowed',
            }}>Noch nicht verfügbar</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── EMPTY STATE ──────────────────────────────────────────────────────────────
function EmptyState({ query }) {
  return (
    <div style={{ gridColumn:'1/-1', textAlign:'center', padding:'64px 24px', color:'var(--muted)' }}>
      <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
      <div style={{ fontSize:18, fontWeight:700, color:'oklch(30% 0.01 260)', marginBottom:6 }}>Keine Ergebnisse</div>
      <div style={{ fontSize:14 }}>Keine Lernumgebungen für „{query}" gefunden.</div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweakState] = useState(() => {
    try {
      return JSON.parse(document.getElementById('__tweak_defaults').textContent);
    } catch { return { roundness:16, density:'comfortable', heroStyle:'gradient', showDifficulty:true }; }
  });
  const setTweak = (key, val) => setTweakState(p => ({...p, [key]:val}));

  const [activeSubject, setActiveSubject] = useState('alle');
  const [activeGrade, setActiveGrade] = useState(null);
  const [query, setQuery] = useState('');
  const [modal, setModal] = useState(null);
  const [showTweaks, setShowTweaks] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [teacher, setTeacher] = useState(null);
  const [view, setView] = useState('students'); // 'students' | 'teacher'

  // Tweaks host protocol
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const subjectColor = activeSubject !== 'alle' ? SUBJECT_MAP[activeSubject]?.color : null;
  const grades = [5,6,7,8,9,10];

  // Filter logic
  const filtered = CARDS.filter(c => {
    if (activeSubject !== 'alle' && c.subject !== activeSubject) return false;
    if (activeGrade && c.grade !== activeGrade) return false;
    if (query) {
      const q = query.toLowerCase();
      return c.title.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.topics.some(t=>t.toLowerCase().includes(q));
    }
    return true;
  });

  const gap = tweaks.density === 'compact' ? 14 : tweaks.density === 'spacious' ? 28 : 20;

  // Hero background
  const heroGradient = tweaks.heroStyle === 'gradient'
    ? `linear-gradient(135deg, oklch(97% 0.015 240) 0%, oklch(97% 0.015 145) 50%, oklch(97% 0.02 55) 100%)`
    : tweaks.heroStyle === 'dark'
    ? `linear-gradient(135deg, oklch(20% 0.03 260) 0%, oklch(22% 0.04 290) 100%)`
    : 'oklch(98% 0.006 60)';
  const heroColor = tweaks.heroStyle === 'dark' ? '#fff' : 'oklch(18% 0.01 260)';
  const heroMuted = tweaks.heroStyle === 'dark' ? 'oklch(75% 0.01 260)' : 'var(--muted)';

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg)' }}>
      {/* ── NAV ── */}
      <nav style={{
        position:'sticky', top:0, zIndex:100,
        background:'oklch(100% 0 0 / 0.88)', backdropFilter:'blur(12px)',
        borderBottom:'1.5px solid var(--border)',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'0 40px', height:64,
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{
            width:34, height:34, borderRadius:10,
            background:'linear-gradient(135deg, var(--bio) 0%, var(--phys) 100%)',
            display:'flex', alignItems:'center', justifyContent:'center',
            color:'#fff', fontWeight:900, fontSize:14,
          }}>LL</div>
          <span style={{ fontWeight:800, fontSize:18, letterSpacing:'-0.3px' }}>LearnLab</span>
        </div>
        {/* Search */}
        <div style={{ position:'relative', width:300 }}>
          <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'var(--muted)', pointerEvents:'none' }}>
            <SearchIcon/>
          </div>
          <input
            value={query}
            onChange={e=>setQuery(e.target.value)}
            placeholder="Suchen …"
            style={{
              width:'100%', padding:'9px 12px 9px 40px',
              border:'1.5px solid var(--border)', borderRadius:100,
              fontFamily:'inherit', fontSize:14, background:'var(--bg)',
              outline:'none', color:'inherit',
              transition:'border-color 0.15s',
            }}
            onFocus={e=>e.target.style.borderColor='oklch(60% 0.17 230)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}
          />
          {query && (
            <button onClick={()=>setQuery('')} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'var(--muted)', display:'flex' }}>
              <CloseIcon/>
            </button>
          )}
        </div>
        {/* Lehrer-Login Button */}
        {teacher ? (
          <button onClick={() => setView(v => v === 'teacher' ? 'students' : 'teacher')} style={{
            display:'flex', alignItems:'center', gap:8,
            padding:'7px 14px 7px 10px', borderRadius:100, border:'none', cursor:'pointer',
            fontFamily:'inherit', fontSize:13, fontWeight:700,
            background: view === 'teacher' ? 'oklch(18% 0.01 260)' : 'oklch(95% 0.005 260)',
            color: view === 'teacher' ? '#fff' : 'oklch(30% 0.01 260)',
            transition:'all 0.18s',
          }}>
            <div style={{
              width:26, height:26, borderRadius:'50%',
              background:'linear-gradient(135deg,oklch(62% 0.17 145),oklch(60% 0.17 230))',
              display:'flex', alignItems:'center', justifyContent:'center',
              color:'#fff', fontSize:11, fontWeight:900,
            }}>
              {teacher.name.split(' ')[1]?.[0]}{teacher.name.split(' ')[0]?.[0]}
            </div>
            {view === 'teacher' ? 'Dashboard' : teacher.name.split(' ')[0]}
          </button>
        ) : (
          <button onClick={() => setShowLogin(true)} style={{
            display:'flex', alignItems:'center', gap:7,
            padding:'8px 16px', borderRadius:100, border:'1.5px solid oklch(91% 0.005 260)',
            background:'#fff', cursor:'pointer',
            fontFamily:'inherit', fontSize:13, fontWeight:600, color:'oklch(35% 0.01 260)',
            transition:'all 0.15s',
          }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Lehrerbereich
          </button>
        )}
        {/* Klassen-Schnellzugriff */}
        <div style={{ display:'flex', gap:6, alignItems:'center', color:'var(--muted)', fontSize:13, fontWeight:600 }}>
          {grades.map(g => (
            <button key={g} onClick={() => { setActiveGrade(activeGrade===g?null:g); }}
              style={{
                padding:'5px 11px', borderRadius:100, border:'none', cursor:'pointer',
                fontFamily:'inherit', fontSize:13, fontWeight:600,
                background: activeGrade===g ? 'oklch(18% 0.01 260)' : 'transparent',
                color: activeGrade===g ? '#fff' : 'var(--muted)',
                transition:'all 0.15s',
              }}>
              {g}
            </button>
          ))}
          <span style={{ fontSize:12, marginLeft:2 }}>Klasse</span>
        </div>
      </nav>

      {/* ── HERO ── */}
      {!query && (
        <div style={{
          background: heroGradient,
          padding:'56px 40px 48px',
          borderBottom: '1.5px solid var(--border)',
        }}>
          <div style={{ maxWidth:900, margin:'0 auto' }}>
            <div style={{ fontSize:13, fontWeight:700, color: subjectColor || 'oklch(60% 0.17 230)', marginBottom:8, textTransform:'uppercase', letterSpacing:'0.08em' }}>
              Realschule · Klasse 5–9
            </div>
            <h1 style={{ fontSize:40, fontWeight:900, lineHeight:1.1, marginBottom:14, color:heroColor, letterSpacing:'-0.5px' }}>
              Interaktiv lernen.<br/>Wirklich verstehen.
            </h1>
            <p style={{ fontSize:16, color:heroMuted, maxWidth:520, lineHeight:1.65, marginBottom:28 }}>
              Entdecke über 20 interaktive Lernumgebungen in Biologie, Chemie, Physik und Mathematik – designed für deinen Unterricht.
            </p>
            {/* Subject pills */}
            <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
              {SUBJECTS.map(s => (
                <SubjectPill
                  key={s.id}
                  subject={s.id}
                  active={activeSubject === s.id}
                  onClick={() => { setActiveSubject(s.id); setActiveGrade(null); }}
                />
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── MAIN CONTENT ── */}
      <main style={{ maxWidth:1100, margin:'0 auto', padding:`${gap+16}px 40px 80px` }}>
        {/* Grade filter strip */}
        {!query && (
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:28, flexWrap:'wrap' }}>
            <span style={{ fontSize:13, fontWeight:700, color:'var(--muted)', marginRight:4 }}>Klasse:</span>
            <button onClick={()=>setActiveGrade(null)} style={{
              padding:'6px 14px', borderRadius:100, border:'none', cursor:'pointer',
              fontFamily:'inherit', fontSize:13, fontWeight:600,
              background: activeGrade===null ? 'oklch(18% 0.01 260)' : 'transparent',
              color: activeGrade===null ? '#fff' : 'var(--muted)',
              boxShadow: activeGrade===null ? 'none' : 'inset 0 0 0 1.5px var(--border)',
              transition:'all 0.15s',
            }}>Alle</button>
            {grades.map(g => (
              <GradePill
                key={g} grade={g}
                active={activeGrade===g}
                subjectColor={subjectColor}
                onClick={()=>setActiveGrade(activeGrade===g?null:g)}
              />
            ))}
            <span style={{ marginLeft:'auto', fontSize:13, color:'var(--muted)' }}>
              {filtered.length} Lernumgebung{filtered.length !== 1 ? 'en' : ''}
            </span>
          </div>
        )}

        {/* Query header */}
        {query && (
          <div style={{ marginBottom:24, display:'flex', alignItems:'center', gap:10 }}>
            <span style={{ fontSize:20, fontWeight:800 }}>Suchergebnisse für „{query}"</span>
            <span style={{ fontSize:14, color:'var(--muted)' }}>({filtered.length})</span>
            <button onClick={()=>setQuery('')} style={{ marginLeft:'auto', padding:'6px 14px', borderRadius:100, border:'1.5px solid var(--border)', background:'none', cursor:'pointer', fontFamily:'inherit', fontSize:13, fontWeight:600, color:'var(--muted)' }}>
              Zurücksetzen
            </button>
          </div>
        )}

        {/* Card grid */}
        <div style={{
          display:'grid',
          gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))',
          gap,
        }}>
          {filtered.length === 0
            ? <EmptyState query={query}/>
            : filtered.map(card => (
              <LernCard
                key={card.id}
                card={card}
                roundness={tweaks.roundness}
                showDifficulty={tweaks.showDifficulty}
                onClick={() => setModal(card)}
              />
            ))
          }
        </div>
      </main>

      {/* ── MODAL ── */}
      {modal && <Modal card={modal} onClose={()=>setModal(null)} roundness={tweaks.roundness}/>}

      {/* ── LOGIN MODAL ── */}
      {showLogin && (
        <LoginModal
          roundness={tweaks.roundness}
          onClose={() => setShowLogin(false)}
          onLogin={user => { setTeacher(user); setShowLogin(false); setView('teacher'); }}
        />
      )}

      {/* ── TEACHER DASHBOARD ── */}
      {view === 'teacher' && teacher && (
        <div style={{ position:'fixed', inset:0, top:64, background:'oklch(98% 0.006 60)', zIndex:50, overflowY:'auto' }}>
          <TeacherDashboard
            user={teacher}
            cards={CARDS}
            roundness={tweaks.roundness}
            onLogout={() => { setTeacher(null); setView('students'); }}
            onShowAll={() => setView('students')}
          />
        </div>
      )}

      {/* ── TWEAKS ── */}
      {showTweaks && (
        <TweaksPanel
          onClose={() => {
            setShowTweaks(false);
            window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
          }}
        >
          <TweakSection title="Layout">
            <TweakSlider label="Abrundung" value={tweaks.roundness} min={0} max={28} step={2}
              onChange={v => setTweak('roundness', v)}/>
            <TweakRadio label="Dichte" value={tweaks.density}
              options={[{value:'compact',label:'Kompakt'},{value:'comfortable',label:'Normal'},{value:'spacious',label:'Luftig'}]}
              onChange={v => setTweak('density', v)}/>
          </TweakSection>
          <TweakSection title="Hero">
            <TweakRadio label="Hero-Stil" value={tweaks.heroStyle}
              options={[{value:'plain',label:'Weiß'},{value:'gradient',label:'Bunt'},{value:'dark',label:'Dunkel'}]}
              onChange={v => setTweak('heroStyle', v)}/>
          </TweakSection>
          <TweakSection title="Karten">
            <TweakToggle label="Schwierigkeit anzeigen" value={tweaks.showDifficulty}
              onChange={v => setTweak('showDifficulty', v)}/>
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
